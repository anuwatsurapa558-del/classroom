function saveAttEdit(cid,subid){
  if(!db.attendance[tk(cid)])db.attendance[tk(cid)]={};
  if(!db.attendance[tk(cid)][subid])db.attendance[tk(cid)][subid]={};
  if(!db.attendance[tk(cid)][subid][attEditDate])db.attendance[tk(cid)][subid][attEditDate]={};
  stuList(cid).forEach(s=>{
    const g=document.getElementById('eabg-'+s.id);if(!g)return;
    const a=g.querySelector('[class*="s-"]');
    if(a){const k=Array.from(a.classList).find(c=>c.startsWith('s-'))?.replace('s-','');if(k)db.attendance[tk(cid)][subid][attEditDate][s.id]=lkmap[k]||k;}
    else delete db.attendance[tk(cid)][subid][attEditDate][s.id];
  });
  // ถ้าวันนี้ไม่มีสถานะเหลือเลย ให้ลบ key วันออก (ไม่ให้สถิติค้าง)
  if(Object.keys(db.attendance[tk(cid)][subid][attEditDate]).length===0){
    delete db.attendance[tk(cid)][subid][attEditDate];
    const dates=attDates(cid,subid).sort().reverse();
    attEditDate=dates[0]||todayStr();
  }
  save();showToast('แก้ไขการเช็คชื่อเรียบร้อย ✓');renderAtt();
}

function renderAttSummary(){
  const el=document.getElementById('att-summary');
  const cs=needCS('attendance');if(!cs){el.innerHTML=noData('book','เลือกห้องและวิชาด้านบน');return;}
  const{cid,subid}=cs,stus=stuList(cid),sub=getSub(cid,subid);
  const dates=attDates(cid,subid).sort();
  if(!dates.length){el.innerHTML=noData('calendar-off','ยังไม่มีข้อมูล');return;}
  let tMa=0,tSay=0,tLa=0,tKh=0,tot=0;
  stus.forEach(s=>dates.forEach(d=>{const st=attRec(cid,subid,d)[s.id];if(st==='มา')tMa++;else if(st==='สาย')tSay++;else if(st==='ลา')tLa++;else if(st==='ขาด')tKh++;if(st)tot++;}));
  const rate=tot?Math.round((tMa+tSay)/tot*100):0,col=rate>=80?'var(--gn)':rate>=60?'var(--am)':'var(--rd)';
  let html=`<div class="f ic g8 mb14"><span class="badge bt">${getCls(cid).name}</span><i class="ti ti-chevron-right" style="color:var(--hn)"></i><span class="badge bt">${sub.name}</span></div>
  <div class="sg"><div class="sc-stat"><div class="sl">วันเช็ค</div><div class="sv" style="color:var(--bl)">${dates.length}</div></div><div class="sc-stat"><div class="sl">มา</div><div class="sv" style="color:var(--gn)">${tMa}</div></div><div class="sc-stat"><div class="sl">สาย</div><div class="sv" style="color:var(--am)">${tSay}</div></div><div class="sc-stat"><div class="sl">ลา</div><div class="sv" style="color:var(--bl)">${tLa}</div></div><div class="sc-stat"><div class="sl">ขาด</div><div class="sv" style="color:var(--rd)">${tKh}</div></div><div class="sc-stat"><div class="sl">อัตรา</div><div class="sv" style="color:${col}">${rate}%</div></div></div>`;
  const recent=dates.slice(-20);
  html+=`<div class="chbox mb14"><div class="chtitle">อัตรามาเรียนรายวัน (${recent.length} วันล่าสุด)</div><div class="barchart">`;
  recent.forEach(d=>{let ma=0,t2=0;stus.forEach(s=>{const st=attRec(cid,subid,d)[s.id];if(st==='มา'||st==='สาย')ma++;if(st)t2++;});const pct=t2?Math.round(ma/t2*100):0,c2=pct>=80?'var(--gn)':pct>=60?'var(--am)':'var(--rd)';const[,m,day]=d.split('-');html+=`<div class="bw"><div class="bval" style="font-size:9px">${pct}%</div><div class="bout"><div class="bin" style="height:${pct}%;background:${c2}"></div></div><div class="blbl">${+day}/${+m}</div></div>`;});
  html+=`</div></div>`;

  // ── สถิติรายเดือน ──
  const months={};
  dates.forEach(d=>{const ym=d.slice(0,7);if(!months[ym])months[ym]={ma:0,tot:0};stus.forEach(s=>{const st=attRec(cid,subid,d)[s.id];if(st==='มา'||st==='สาย')months[ym].ma++;if(st)months[ym].tot++;});});
  const monthKeys=Object.keys(months).sort();
  if(monthKeys.length){
    const thMonth=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    html+=`<div class="card mb14"><div class="cp" style="border-bottom:1px solid var(--bd)"><b><i class="ti ti-calendar-month"></i> สถิติรายเดือน</b></div><div class="tw"><table><thead><tr><th>เดือน</th><th>วันเช็ค</th><th>มาเรียน</th><th>อัตรา</th></tr></thead><tbody>`;
    monthKeys.forEach(ym=>{
      const[y,m]=ym.split('-');const mInfo=months[ym];
      const daysInMonth=dates.filter(d=>d.slice(0,7)===ym).length;
      const mpct=mInfo.tot?Math.round(mInfo.ma/mInfo.tot*100):0;
      const mc=mpct>=80?'var(--gn)':mpct>=60?'var(--am)':'var(--rd)';
      html+=`<tr><td><b>${thMonth[+m-1]} ${+y+543}</b></td><td>${daysInMonth} วัน</td><td>${mInfo.ma}/${mInfo.tot}</td><td style="font-weight:700;color:${mc}">${mpct}%</td></tr>`;
    });
    html+=`</tbody></table></div></div>`;
  }

  // ── นักเรียนเวลาเรียนต่ำกว่า 80% / ขาดบ่อย ──
  const risk=[];
  stus.forEach(s=>{
    let ma=0,kh=0,tot=0;
    dates.forEach(d=>{const st=attRec(cid,subid,d)[s.id];if(st==='มา'||st==='สาย')ma++;else if(st==='ขาด')kh++;if(st)tot++;});
    const pct=tot?Math.round(ma/tot*100):100;
    if(tot>0&&(pct<80||kh>=3))risk.push({s,pct,kh,ma,tot});
  });
  risk.sort((a,b)=>a.pct-b.pct);
  html+=`<div class="card"><div class="cp" style="border-bottom:1px solid var(--bd);background:${risk.length?'var(--rdl)':'var(--gnl)'}"><b style="color:${risk.length?'var(--rd)':'var(--gn)'}"><i class="ti ti-alert-triangle"></i> นักเรียนที่ต้องติดตาม (เวลาเรียน < 80% หรือขาด ≥ 3 ครั้ง)</b></div>`;
  if(!risk.length){
    html+=`<div class="empty" style="padding:20px"><i class="ti ti-circle-check" style="color:var(--gn)"></i><div>นักเรียนทุกคนมีเวลาเรียนเพียงพอ</div></div>`;
  }else{
    html+=`<div class="tw"><table><thead><tr><th>ที่</th><th>ชื่อ-สกุล</th><th>มาเรียน</th><th>ขาด</th><th>อัตรา</th></tr></thead><tbody>`;
    risk.forEach(r=>{
      const rc=r.pct<60?'var(--rd)':'var(--am)';
      html+=`<tr><td style="font-weight:700;color:var(--mu)">${r.s.no}</td><td>${r.s.firstName} ${r.s.lastName}</td><td>${r.ma}/${r.tot}</td><td><span class="badge br">${r.kh}</span></td><td style="font-weight:800;color:${rc}">${r.pct}%</td></tr>`;
    });
    html+=`</tbody></table></div>`;
  }
  html+=`</div>`;

  el.innerHTML=html;
}

function renderAsgTable(cid,subid,stus,asgs,mode){
  const isScore=(mode==='score');
  const title=isScore?'งานเก็บคะแนน':'งานติดตามการส่ง';
  const icon=isScore?'ti-star':'ti-checklist';
  const hdBg=isScore?'#EEF2FF':'#FEF3C7';
  const hint=isScore?'แตะที่ช่องเพื่อกรอกคะแนน':'แตะช่องเพื่อเลือกสถานะ';

  if(!asgs.length){
    return `<div class="card cp mb14"><div class="empty" style="padding:20px">
      <i class="ti ${isScore?'ti-star-off':'ti-checklist'}" style="color:var(--mu)"></i>

    </div></div>`;
  }

  // จัดขนาดคอลัมน์: น้อย = กว้าง, มาก = แคบ
  const n=asgs.length;
  let colW;
  if(n<=3)colW=90; else if(n<=6)colW=64; else if(n<=10)colW=48; else if(n<=15)colW=38; else colW=32;
  let hdH=Math.max(70,Math.min(140,60+n*3));
  const maxChar=colW<40?7:colW<55?10:14;
  const fontSize=colW<40?9.5:colW<55?10.5:11.5;

  let html=`<div class="card mb14" style="overflow:auto"><div style="padding:10px">
    <div class="f ic jb" style="margin-bottom:8px">
      <div style="font-size:12.5px;color:var(--mu)"><i class="ti ${icon}"></i> ${title} <span style="font-size:11px">· ${hint}</span></div>
      <div style="font-size:11px;color:var(--mu)">${n} งาน</div>
    </div>
    <table style="border-collapse:collapse;font-size:11.5px;width:100%;min-width:${280+n*colW}px;table-layout:fixed">
      <colgroup>
        <col style="width:34px">
        <col style="width:130px">
        ${asgs.map(()=>`<col style="width:${colW}px">`).join('')}
      </colgroup>
      <thead><tr style="background:var(--sf2)">
        <th style="border:1px solid var(--bd);padding:5px 3px;text-align:center;font-size:11px">ที่</th>

    </th>`;
  });
  html+=`</tr></thead><tbody>`;
  stus.forEach(s=>{
    html+=`<tr>
      <td style="border:1px solid var(--bd);padding:2px 3px;text-align:center;color:var(--mu);font-size:11px">${s.no}</td>

        html+=`<td style="border:1px solid var(--bd);padding:0;text-align:center;${disp!==''?'background:#F0F9FF':''}">

        </td>`;
      } else {

        html+=`<td style="border:1px solid var(--bd);padding:0;text-align:center;${bg?'background:'+bg:''}">
          <select style="width:100%;border:none;background:transparent;text-align:center;padding:4px 2px;font-size:11px;font-family:inherit;outline:none;color:${col};font-weight:${v?'600':'400'};box-sizing:border-box;-webkit-appearance:none;-moz-appearance:none;appearance:none"
            onchange="saveTrackInline('${cid}','${subid}','${a.id}','${s.id}',this.value)">
            <option value="" ${!v?'selected':''}>—</option>
            <option value="ตรงเวลา" ${v==='ตรงเวลา'?'selected':''}>✓ ตรงเวลา</option>
            <option value="ส่งช้า" ${v==='ส่งช้า'?'selected':''}>✓ ส่งช้า</option>
          </select>
        </td>`;
      }
    });
    html+=`</tr>`;
  });
  html+=`</tbody></table>`;
  if(!isScore){
    html+=`<div style="margin-top:6px;font-size:10.5px;color:var(--mu)">
      <i class="ti ti-check" style="color:var(--gn)"></i> ตรงเวลา · 
      <i class="ti ti-check" style="color:var(--am)"></i> ส่งช้า · ว่าง = ยังไม่ส่ง
    </div>`;
  }
  html+=`</div></div>`;
  return html;
}

function saveEditAsg(cid,subid,aid,isTrack){
  const asgs=asgList(cid,subid);
  const a=asgs.find(x=>x.id===aid);
  if(!a)return;
  const name=(document.getElementById('edAsgName').value||'').trim();
  if(!name){showToast('กรุณากรอกชื่องาน');return;}
  a.name=name;

    const max=parseInt(document.getElementById('edAsgMax').value);

    a.maxScore=max;
  }
  a.dueDate=document.getElementById('edAsgDue').value||'';
  save();openManageAsg(cid,subid);
  showToast('บันทึกแล้ว ✓');
}

// ── Inline save (autosave เมื่อพิมพ์/เลือกในตาราง) ──
function saveScoreInline(cid,subid,aid,stuId,val,maxScore){
  const tkey=tk(cid);
  if(!db.scores[tkey])db.scores[tkey]={};
  if(!db.scores[tkey][subid])db.scores[tkey][subid]={};
  if(!db.scores[tkey][subid][aid])db.scores[tkey][subid][aid]={};
  const v=(val||'').toString().trim();
  if(v===''||isNaN(parseFloat(v))){
    delete db.scores[tkey][subid][aid][stuId];
  } else {
    const n=Math.min(parseFloat(v),maxScore);
    db.scores[tkey][subid][aid][stuId]=n;
  }
  save();
}
function saveTrackInline(cid,subid,aid,stuId,val){
  const tkey=tk(cid);
  if(!db.scores[tkey])db.scores[tkey]={};
  if(!db.scores[tkey][subid])db.scores[tkey][subid]={};
  if(!db.scores[tkey][subid][aid])db.scores[tkey][subid][aid]={};
  if(!val){
    delete db.scores[tkey][subid][aid][stuId];
  } else {
    db.scores[tkey][subid][aid][stuId]=val;
  }
  save();
  // re-render เพื่ออัปเดตสีพื้นเซลล์
  renderScEntry();
}

function setAsgType(t){

  document.getElementById('atype-track')?.classList.toggle('active',t==='track');
  // ซ่อน/แสดงช่องคะแนนเต็ม + ช่องกำหนดส่งเดี่ยว

    :'<i class="ti ti-info-circle"></i> งานเก็บคะแนน: นำไปคำนวณเกรดตามสัดส่วนคะแนนเก็บ';

function addAsg(cid,subid){
  const name=val('asgName');
  if(!name){showToast('กรุณากรอกชื่องาน');return;}
  if(!db.assignments[tk(cid)])db.assignments[tk(cid)]={};
  if(!db.assignments[tk(cid)][subid])db.assignments[tk(cid)][subid]=[];
  const id=uid();
  if(asgType==='track'){
    const due=val('asgDue2')||'';
    db.assignments[tk(cid)][subid].push({id,name,type:'track',dueDate:due});
    if(document.getElementById('asgDue2'))document.getElementById('asgDue2').value='';
  }else{
    const max=parseInt(val('asgMax'));
    if(!max||max<1){showToast('กรุณากรอกคะแนนเต็ม');return;}
    const due=val('asgDue')||'';
    db.assignments[tk(cid)][subid].push({id,name,maxScore:max,type:'score',dueDate:due});
    if(document.getElementById('asgMax'))document.getElementById('asgMax').value='';
    if(document.getElementById('asgDue'))document.getElementById('asgDue').value='';
  }
  document.getElementById('asgName').value='';
  save();renderScEntry();
}
function delAsg(cid,subid,aid){
  if(!confirm('ลบงานนี้? คะแนนทั้งหมดจะหายด้วย'))return;
  db.assignments[tk(cid)][subid]=(db.assignments[tk(cid)][subid]||[]).filter(a=>a.id!==aid);
  if((db.scores[tk(cid)]||{})[subid])delete db.scores[tk(cid)][subid][aid];
  save();renderScEntry();
}

/* คะแนนสอบ */
function renderScExam(){
  const el=document.getElementById('sc-exam');
  const cs=needCS('scores');if(!cs){el.innerHTML=noData('book','เลือกห้องและวิชาด้านบน');return;}
  const{cid,subid}=cs;const sub=getSub(cid,subid),stus=stuList(cid);
  const wE=sub.wExam??30,wM=sub.wMid??50,wF=sub.wFinal??50;
  const midMax=sub.midMax||100,finMax=sub.finalMax||100;
  const exMap=examMap(cid,subid);
  let html=`<div class="prop-box"><div class="prop-title">สัดส่วนคะแนนสอบ — ${sub.name}</div>
    <div class="prop-bar"><div class="prop-seg" style="width:${wM}%;background:var(--pu)">${wM}% กลางภาค</div><div class="prop-seg" style="width:${wF}%;background:var(--or)">${wF}% ปลายภาค</div></div>
    <div style="font-size:12px;color:var(--mu)">คะแนนสอบรวม ${wE}% ของคะแนนทั้งหมด | กลางภาค ${wM}% | ปลายภาค ${wF}% ของคะแนนสอบ</div>
  </div>
  <div class="card cp mb14"><div class="f ic g8 fw"><div><b>คะแนนเต็มกลางภาค:</b></div><input type="number" id="midMaxInp" value="${midMax}" style="width:80px" onchange="updateExamMax('${cid}','${subid}','mid',this.value)"><div><b>คะแนนเต็มปลายภาค:</b></div><input type="number" id="finMaxInp" value="${finMax}" style="width:80px" onchange="updateExamMax('${cid}','${subid}','fin',this.value)"></div></div>
  <div class="card"><div class="cp" style="border-bottom:1px solid var(--bd)"><div class="f ic jb"><div><b>กรอกคะแนนสอบ</b></div><button class="btn btn-g btn-sm" onclick="saveExam('${cid}','${subid}')"><i class="ti ti-device-floppy"></i>บันทึก</button></div></div>
  <div class="tw"><table><thead><tr><th>ที่</th><th>ชื่อ-สกุล</th><th>กลางภาค (/${midMax})</th><th>ปลายภาค (/${finMax})</th></tr></thead><tbody>`;
  stus.forEach(s=>{
    const ex=exMap[s.id]||{};
    html+=`<tr><td style="font-weight:700;color:var(--mu)">${s.no}</td><td>${s.firstName} ${s.lastName}</td>
      <td><input type="number" class="sc-inp" id="mid-${s.id}" value="${ex.mid!==undefined?ex.mid:''}" min="0" max="${midMax}" placeholder="—"></td>
      <td><input type="number" class="sc-inp" id="fin-${s.id}" value="${ex.final!==undefined?ex.final:''}" min="0" max="${finMax}" placeholder="—"></td></tr>`;
  });
  html+=`</tbody></table></div></div>`;
  el.innerHTML=html;
}
function updateExamMax(cid,subid,type,v){
  const sub=getSub(cid,subid);if(!sub)return;
  if(type==='mid')sub.midMax=parseFloat(v)||100;
  else sub.finalMax=parseFloat(v)||100;
  save();
}
function saveExam(cid,subid){
  if(!db.examScores[tk(cid)])db.examScores[tk(cid)]={};
  if(!db.examScores[tk(cid)][subid])db.examScores[tk(cid)][subid]={};
  const sub=getSub(cid,subid);
  const midMax=sub.midMax||100, finMax=sub.finalMax||100;
  const store=db.examScores[tk(cid)][subid];
  stuList(cid).forEach(s=>{
    const mi=document.getElementById('mid-'+s.id);
    const fi=document.getElementById('fin-'+s.id);
    if(!store[s.id])store[s.id]={};
    // mid
    if(mi){
      const v=mi.value.trim();
      if(v===''||isNaN(parseFloat(v))){
        delete store[s.id].mid; // ล้างคะแนน
      } else {
        store[s.id].mid=Math.min(parseFloat(v),midMax);
      }
    }
    // final
    if(fi){
      const v=fi.value.trim();
      if(v===''||isNaN(parseFloat(v))){
        delete store[s.id].final; // ล้างคะแนน
      } else {
        store[s.id].final=Math.min(parseFloat(v),finMax);
      }
    }
    // ถ้าไม่มีคะแนนอะไรเลย ลบ record ทิ้ง
    if(store[s.id].mid===undefined && store[s.id].final===undefined){
      delete store[s.id];
    }
  });
  save();showToast('บันทึกคะแนนสอบเรียบร้อย ✓');renderScExam();
}

// ── Helpers ──
function fsGroupKey(cid){
  const cls=db.classes.find(c=>c.id===cid);
  const tid=cls?.termId||currentTermId||'';
  return tid+'__'+cid;
}
function fsCheckKey(cid,gid){return fsGroupKey(cid)+'__'+gid;}
function fsGroups(cid){return db.fiveS.groups[fsGroupKey(cid)]||[];}
function fsSetGroups(cid,arr){db.fiveS.groups[fsGroupKey(cid)]=arr;}
function fsChecks(cid,gid,date){return ((db.fiveS.checks[fsCheckKey(cid,gid)]||{})[date])||{};}
// items ของแต่ละกลุ่ม — ถ้ายังไม่มี ให้ใช้ค่า default
function fsGroupItems(g){
  if(!g.items||!g.items.length)return ['สะสาง','สะดวก','สะอาด','สร้างมาตรฐาน','สร้างวินัย'];
  return g.items;
}

    </div>
  </div>`;
  groups.forEach((g,idx)=>{
    const leader=stus.find(s=>s.id===g.leaderId);
    const members=(g.memberIds||[]).map(id=>stus.find(s=>s.id===id)).filter(Boolean);
    const items=fsGroupItems(g);
    html+=`<div class="card mb14">
      <div class="cp" style="border-bottom:1px solid var(--bd);background:var(--sf2)">
        <div class="f ic jb fw g8">
          <div>
            <b style="font-size:14px">${g.name}</b>
            <span style="font-size:11.5px;color:var(--mu);margin-left:8px">${1+members.length} คน</span>
          </div>
          <div class="f g8">
            <button class="btn btn-xs btn-p" onclick="openFsManageMembers('${cid}','${g.id}')"><i class="ti ti-users"></i>สมาชิก</button>
            <button class="btn btn-xs" style="color:var(--bl);border-color:var(--bl)" onclick="openFsGroupItems('${cid}','${g.id}')"><i class="ti ti-list-check"></i>หัวข้อ</button>
            <button class="btn btn-xs" onclick="openEditFsGroup('${cid}','${g.id}')"><i class="ti ti-edit"></i>แก้ไข</button>
            <button class="btn btn-xs" style="color:var(--rd);border-color:var(--rd)" onclick="delFsGroup('${cid}','${g.id}')"><i class="ti ti-trash"></i>ลบ</button>
          </div>
        </div>
      </div>
      <div class="cp">
        <div style="margin-bottom:8px">
          <span style="font-size:11.5px;color:var(--mu)">หัวหน้ากลุ่ม:</span>
          ${leader?`<span style="background:#FEF3C7;padding:3px 10px;border-radius:8px;font-size:12.5px;font-weight:600;color:#92400E;margin-left:4px"><i class="ti ti-crown"></i> ${leader.firstName} ${leader.lastName}</span>`:'<span style="color:var(--rd);font-size:12px;margin-left:4px">ยังไม่มีหัวหน้า!</span>'}
        </div>
        <div style="margin-bottom:8px">
          <span style="font-size:11.5px;color:var(--mu)">หัวข้อกิจกรรม (${items.length}):</span>
          <div style="margin-top:5px">
            ${items.map(it=>`<span style="display:inline-block;background:#EEF2FF;color:#3730A3;padding:3px 8px;border-radius:6px;font-size:11.5px;margin:2px">${it}</span>`).join('')}

            ${members.length?members.map(m=>`<span style="display:inline-block;background:var(--sf2);padding:3px 10px;border-radius:8px;font-size:12px;margin:2px">${m.no}. ${m.firstName} ${m.lastName}</span>`).join(''):'<span style="font-size:11.5px;color:var(--mu);font-style:italic">รอเพิ่มสมาชิก</span>'}

// ── เพิ่มกลุ่ม ──

  const groups=fsGroups(cid);

  const opts=available.map(s=>`<option value="${s.id}">${s.no}. ${s.firstName} ${s.lastName}</option>`).join('');

      <select id="fsGpLeader">

      <i class="ti ti-info-circle"></i> หลังสร้างกลุ่ม หัวหน้ากลุ่มจะเป็นคนเพิ่มสมาชิกเองผ่านแอปนักเรียน

      <button class="btn" onclick="closeMD()">ยกเลิก</button>
      <button class="btn btn-p" onclick="submitAddFsGroup('${cid}')"><i class="ti ti-check"></i>สร้างกลุ่ม</button>

function submitAddFsGroup(cid){
  const name=(document.getElementById('fsGpName').value||'').trim();
  const leaderId=document.getElementById('fsGpLeader').value;
  if(!name){showToast('กรุณากรอกชื่อกลุ่ม');return;}
  if(!leaderId){showToast('กรุณาเลือกหัวหน้ากลุ่ม');return;}

  groups.push({id:uid(),name,leaderId,memberIds:[]});

  save();closeMD();renderFiveS();

}

// ── แก้กลุ่ม (ชื่อ + เปลี่ยนหัวหน้า) ──
function openEditFsGroup(cid,gid){
  const stus=stuList(cid);
  const groups=fsGroups(cid);
  const g=groups.find(x=>x.id===gid);
  if(!g)return;
  // หัวหน้าใหม่ต้องเป็นสมาชิกในกลุ่ม หรือคนที่ยังไม่มีกลุ่ม
  const inGroup=[g.leaderId,...(g.memberIds||[])].filter(Boolean);
  const assignedElsewhere=new Set();
  groups.forEach(g2=>{
    if(g2.id===gid)return;
    if(g2.leaderId)assignedElsewhere.add(g2.leaderId);
    (g2.memberIds||[]).forEach(id=>assignedElsewhere.add(id));
  });
  const leaderOpts=stus.filter(s=>!assignedElsewhere.has(s.id)).map(s=>{
    const inThis=inGroup.includes(s.id);
    return `<option value="${s.id}" ${s.id===g.leaderId?'selected':''}>${s.no}. ${s.firstName} ${s.lastName}${inThis?' (ในกลุ่ม)':''}</option>`;
  }).join('');
  showMD(`<div class="mt">แก้ไขกลุ่ม</div>
    <div class="fg"><label class="fl">ชื่อกลุ่ม</label>
      <input type="text" id="fsGpName" value="${g.name.replace(/"/g,'&quot;')}">
    </div>
    <div class="fg"><label class="fl"><i class="ti ti-crown"></i> หัวหน้ากลุ่ม</label>
      <select id="fsGpLeader">${leaderOpts}</select>
    </div>
    <div class="f g8" style="justify-content:flex-end">
      <button class="btn" onclick="closeMD()">ยกเลิก</button>
      <button class="btn btn-p" onclick="saveEditFsGroup('${cid}','${gid}')"><i class="ti ti-check"></i>บันทึก</button>
    </div>
  `);
}
function saveEditFsGroup(cid,gid){
  const groups=fsGroups(cid);
  const g=groups.find(x=>x.id===gid);
  if(!g)return;
  const name=(document.getElementById('fsGpName').value||'').trim();
  const leaderId=document.getElementById('fsGpLeader').value;
  if(!name){showToast('กรุณากรอกชื่อ');return;}
  if(!leaderId){showToast('กรุณาเลือกหัวหน้า');return;}
  g.name=name;
  // ถ้าเปลี่ยนหัวหน้าใหม่ให้ย้ายคนเก่ามาเป็นสมาชิก และเอาคนใหม่ออกจาก memberIds
  if(g.leaderId!==leaderId){
    if(g.leaderId && !g.memberIds.includes(g.leaderId)){
      g.memberIds.push(g.leaderId);
    }
    g.memberIds=g.memberIds.filter(id=>id!==leaderId);
    g.leaderId=leaderId;
  }
  fsSetGroups(cid,groups);
  save();closeMD();renderFiveS();
  showToast('✓ บันทึกแล้ว');
}
function delFsGroup(cid,gid){
  const groups=fsGroups(cid);
  const g=groups.find(x=>x.id===gid);
  if(!g)return;
  if(!confirm(`ลบ "${g.name}"? ข้อมูลเช็ค 5 ส ของกลุ่มนี้จะหายทั้งหมด`))return;
  fsSetGroups(cid,groups.filter(x=>x.id!==gid));
  delete db.fiveS.checks[fsCheckKey(cid,gid)];
  save();renderFiveS();
  showToast('ลบกลุ่มแล้ว');
}

// ── ครูจัดการสมาชิกในกลุ่ม ──

  const inOther=new Set();
  groups.forEach(g2=>{
    if(g2.id===gid)return;
    if(g2.leaderId)inOther.add(g2.leaderId);
    (g2.memberIds||[]).forEach(id=>inOther.add(id));

    </div>`).join(''):'<div style="padding:12px;background:var(--sf2);border-radius:6px;text-align:center;font-size:12px;color:var(--mu)">ยังไม่มีสมาชิก</div>';

      <input type="checkbox" class="fsTAddMem" value="${s.id}" style="width:18px;height:18px">
      <span style="font-size:12.5px">${s.no}. ${s.firstName} ${s.lastName}</span>
    </label>`).join(''):'<div style="padding:12px;background:var(--sf2);border-radius:6px;text-align:center;font-size:12px;color:var(--mu)">ไม่มีนักเรียนว่าง (ทุกคนอยู่ในกลุ่มแล้ว)</div>';

  showMD(`<div class="mt">จัดการสมาชิก — ${g.name}</div>
    <div style="padding:10px;background:#FEF3C7;border-radius:6px;margin-bottom:14px;font-size:12px;color:#92400E">
      <i class="ti ti-crown"></i> <b>หัวหน้ากลุ่ม:</b> ${leader?leader.firstName+' '+leader.lastName:'ยังไม่ได้แต่งตั้ง'}
    </div>
    
    <div style="font-weight:700;font-size:13px;margin-bottom:8px"><i class="ti ti-users"></i> สมาชิกปัจจุบัน (${members.length} คน)</div>
    <div style="max-height:180px;overflow:auto;margin-bottom:14px">${memberRows}</div>
    
    <div style="font-weight:700;font-size:13px;margin-bottom:8px"><i class="ti ti-user-plus"></i> เพิ่มสมาชิก (มี ${available.length} คนว่าง)</div>

    <div class="f g8" style="justify-content:space-between;margin-top:10px">
      <button class="btn" onclick="closeMD()">ปิด</button>
      <div class="f g8">
        <button class="btn btn-sm" onclick="fsTeacherSelAllAvail(true)"${!available.length?' disabled':''}>เลือกทั้งหมด</button>
        <button class="btn btn-p" onclick="fsTeacherAddMembers('${cid}','${gid}')"${!available.length?' disabled':''}><i class="ti ti-check"></i>เพิ่มที่เลือก</button>

}

function fsTeacherSelAllAvail(all){
  document.querySelectorAll('.fsTAddMem').forEach(cb=>cb.checked=all);
}

function fsTeacherAddMembers(cid,gid){
  const ids=[...document.querySelectorAll('.fsTAddMem:checked')].map(cb=>cb.value);
  if(!ids.length){showToast('กรุณาเลือกอย่างน้อย 1 คน');return;}

  const g=groups.find(x=>x.id===gid);
  if(!g)return;
  g.memberIds=[...new Set([...(g.memberIds||[]),...ids])];
  fsSetGroups(cid,groups);
  save();closeMD();renderFiveS();
  showToast(`เพิ่ม ${ids.length} คนเข้ากลุ่มแล้ว ✓`);

function fsTeacherRemoveMember(cid,gid,stuId){
  if(!confirm('เอาสมาชิกคนนี้ออกจากกลุ่ม?'))return;

  save();closeMD();renderFiveS();

// ── หน้า 3: สรุปผล ──
function renderFiveSSummary(cid){
  const groups=fsGroups(cid);
  const stus=stuList(cid);
  const cls=db.classes.find(c=>c.id===cid);
  if(!groups.length){
    return `<div class="card cp"><div class="empty" style="padding:30px">
      <i class="ti ti-chart-bar" style="color:var(--mu);font-size:36px"></i>
      <div style="font-weight:700;margin-top:8px">ยังไม่มีกลุ่ม</div>
      <p style="font-size:12px;color:var(--mu)">สร้างกลุ่มในแท็บ "จัดการกลุ่ม" ก่อน</p>
    </div></div>`;
  }
  // คำนวณช่วงวันที่ (30 วันย้อนหลัง)
  const today=new Date();
  const dates=[];
  for(let i=29;i>=0;i--){
    const d=new Date(today);d.setDate(d.getDate()-i);
    dates.push(d.toISOString().slice(0,10));
  }
  let html=`<div class="card cp mb14">
    <b><i class="ti ti-chart-bar"></i> สรุปผลกิจกรรม 5 ส — ${cls.name}</b>
    <div style="font-size:12px;color:var(--mu);margin-top:3px">30 วันย้อนหลัง · ${groups.length} กลุ่ม</div>
  </div>`;
  groups.forEach(g=>{
    const items=fsGroupItems(g);
    const leader=stus.find(s=>s.id===g.leaderId);
    const members=[g.leaderId,...(g.memberIds||[])].map(id=>stus.find(s=>s.id===id)).filter(Boolean);
    // นับ: total = จำนวนวัน × สมาชิก × หัวข้อ, done = จำนวนที่ทำ
    let totalPossible=0, totalDone=0;
    const perStu={};
    const perItem={};
    items.forEach((it,i)=>{perItem[i]={done:0,total:0,name:it};});
    members.forEach(m=>{perStu[m.id]={name:m.firstName+' '+m.lastName,no:m.no,done:0,total:0};});
    let daysWithData=0;
    dates.forEach(d=>{
      const dayCheck=fsChecks(cid,g.id,d);
      if(!Object.keys(dayCheck).length)return;
      daysWithData++;
      members.forEach(m=>{
        items.forEach((it,i)=>{
          const done=((dayCheck[m.id]||{}).items||{})[i]===true;
          totalPossible++;
          if(done)totalDone++;
          perStu[m.id].total++;
          if(done)perStu[m.id].done++;
          perItem[i].total++;
          if(done)perItem[i].done++;
        });
      });
    });
    const pct=totalPossible?Math.round(totalDone/totalPossible*100):0;
    const pctCol=pct>=80?'var(--gn)':pct>=60?'var(--am)':'var(--rd)';
    html+=`<div class="card mb14">
      <div class="cp" style="border-bottom:1px solid var(--bd);background:var(--sf2)">
        <div class="f ic jb fw g8">
          <div>
            <b style="font-size:14px">${g.name}</b>
            <span style="font-size:11.5px;color:var(--mu);margin-left:8px">
              <i class="ti ti-crown" style="color:#92400E"></i> ${leader?leader.firstName+' '+leader.lastName:'—'} · ${members.length} คน
            </span>
          </div>
          <div style="text-align:right">
            <div style="font-size:24px;font-weight:800;color:${pctCol};line-height:1">${pct}%</div>
            <div style="font-size:10px;color:var(--mu)">${daysWithData} วันที่เช็ค</div>
          </div>
        </div>
      </div>
      <div class="cp">`;
    if(!daysWithData){
      html+=`<div style="text-align:center;padding:16px;font-size:12.5px;color:var(--mu)">ยังไม่มีข้อมูลเช็คในช่วงนี้</div>`;
    } else {
      // สรุปรายบุคคล
      html+=`<div style="font-size:11.5px;color:var(--mu);margin-bottom:6px"><b>คะแนนรายบุคคล</b></div>
        <div class="tw" style="max-height:250px;overflow:auto"><table style="width:100%;font-size:12px">
        <thead><tr style="background:var(--sf2)"><th style="padding:5px;width:36px">ที่</th><th style="padding:5px;text-align:left">ชื่อ</th><th style="padding:5px;width:80px">คะแนน</th><th style="padding:5px;width:60px">%</th></tr></thead><tbody>`;
      Object.values(perStu).sort((a,b)=>a.no-b.no).forEach(s=>{
        const p=s.total?Math.round(s.done/s.total*100):0;
        const col=p>=80?'var(--gn)':p>=60?'var(--am)':'var(--rd)';
        html+=`<tr><td style="padding:4px;text-align:center;color:var(--mu)">${s.no}</td>
          <td style="padding:4px">${s.name}</td>
          <td style="padding:4px;text-align:center">${s.done}/${s.total}</td>
          <td style="padding:4px;text-align:center;font-weight:700;color:${col}">${p}%</td></tr>`;
      });
      html+=`</tbody></table></div>`;
      // สรุปรายหัวข้อ
      html+=`<div style="font-size:11.5px;color:var(--mu);margin-top:10px;margin-bottom:6px"><b>คะแนนรายหัวข้อ</b></div>
        <div class="f g8 fw">`;
      items.forEach((it,i)=>{
        const stat=perItem[i];
        const p=stat.total?Math.round(stat.done/stat.total*100):0;
        const col=p>=80?'#DCFCE7':p>=60?'#FEF3C7':'#FEE2E2';
        const fc=p>=80?'#15803D':p>=60?'#92400E':'#B91C1C';
        html+=`<div style="background:${col};padding:6px 10px;border-radius:6px;font-size:12px">
          <b style="color:${fc}">${it}</b> <span style="color:${fc};font-weight:700">${p}%</span>
          <span style="color:${fc};opacity:.7;font-size:10.5px">(${stat.done}/${stat.total})</span>
        </div>`;
      });
      html+=`</div>`;
    }
    html+=`</div></div>`;
  });
  return html;
}

function expClsChange(type){
  const cid=document.getElementById(`ex-${type}-cls`).value;

function csvEsc(v){const s=String(v===null||v===undefined?'':v);return s.includes(',')||s.includes('"')||s.includes('\n')?`"${s.replace(/"/g,'""')}"`:s;}
function csvRow(arr){return arr.map(csvEsc).join(',');}
function dlCSV(fname,rows){
  const bom='\uFEFF',csv=bom+rows.join('\r\n'),blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fname;a.click();
}

function exportScores(){
  const cid=document.getElementById('ex-sc-cls')?.value;
  const subVal=document.getElementById('ex-sc-sub')?.value;
  if(!cid){showToast('เลือกห้องเรียนก่อน');return;}
  const cls=getCls(cid),stus=stuList(cid);
  const targetSubs=subVal==='__all__'?subList(cid):subList(cid).filter(s=>s.id===subVal);
  if(!targetSubs.length){showToast('ไม่มีวิชา');return;}
  if(!stus.length){showToast('ไม่มีนักเรียน');return;}
  const rows=[];
  targetSubs.forEach(sub=>{
    const asgs=asgList(cid,sub.id);
    const wA=sub.wAssign??70,wE=sub.wExam??30,wM=sub.wMid??50,wF=sub.wFinal??50;
    const midMax=sub.midMax||100,finMax=sub.finalMax||100;
    rows.push(`# ห้อง: ${cls.name}  วิชา: ${sub.name}${sub.code?' ('+sub.code+')':''}  สัดส่วน: เก็บ${wA}%:สอบ${wE}%`);
    const hdr=['เลขที่','ชื่อ','นามสกุล'];
    asgs.forEach(a=>hdr.push(`${a.name}(/${a.maxScore})`));
    hdr.push(`คะแนนเก็บ%(${wA}%)`,`กลางภาค(/${midMax})`,`ปลายภาค(/${finMax})`,`คะแนนสอบ%(${wE}%)`,`รวม%`,`เกรด`);
    rows.push(csvRow(hdr));
    stus.forEach(s=>{
      const row=[s.no,s.firstName,s.lastName];
      asgs.forEach(a=>{const v=scMap(cid,sub.id,a.id)[s.id];row.push(v!==undefined&&v!==''?v:'');});
      const t=calcTotal(cid,sub.id,s.id);
      row.push(t.assignScore.toFixed(1),t.midRaw!==null?t.midRaw:'',t.finRaw!==null?t.finRaw:'',t.examScore.toFixed(1),t.totalScore.toFixed(1),t.grade.g);
      rows.push(csvRow(row));
    });
    rows.push('');
  });
  dlCSV(`คะแนน_${cls.name}_${todayStr()}.csv`,rows);showToast('ดาวน์โหลดแล้ว ✓');
}

function exportAttendance(){
  const cid=document.getElementById('ex-at-cls')?.value;
  const subVal=document.getElementById('ex-at-sub')?.value;
  const mode=document.getElementById('ex-at-mode')?.value||'daily';
  if(!cid){showToast('เลือกห้องเรียนก่อน');return;}
  const cls=getCls(cid),stus=stuList(cid);
  const targetSubs=subVal==='__all__'?subList(cid):subList(cid).filter(s=>s.id===subVal);
  if(!stus.length){showToast('ไม่มีนักเรียน');return;}
  const rows=[];
  targetSubs.forEach(sub=>{
    const dates=attDates(cid,sub.id).sort();
    rows.push(`# ห้อง: ${cls.name}  วิชา: ${sub.name}${sub.code?' ('+sub.code+')':''}`);
    if(mode==='daily'){
      const hdr=['เลขที่','ชื่อ','นามสกุล'];dates.forEach(d=>hdr.push(thDate(d)));hdr.push('รวมมา','รวมขาด','วันเรียนทั้งหมด','%มาเรียน');
      rows.push(csvRow(hdr));
      stus.forEach(s=>{
        const row=[s.no,s.firstName,s.lastName];let ma=0,kh=0,tot=0;
        dates.forEach(d=>{const st=attRec(cid,sub.id,d)[s.id]||'';row.push(st);if(st==='มา'||st==='สาย')ma++;if(st==='ขาด')kh++;if(st)tot++;});
        const pct=tot?Math.round(ma/tot*100):0;row.push(ma,kh,tot,pct+'%');rows.push(csvRow(row));
      });
    }else{
      rows.push(csvRow(['เลขที่','ชื่อ','นามสกุล','มา','มาสาย','ลา','ขาด','รวมมา','รวมขาด','ทั้งหมด','%มาเรียน']));
      stus.forEach(s=>{
        let ma=0,say=0,la=0,kh=0,tot=0;
        dates.forEach(d=>{const st=attRec(cid,sub.id,d)[s.id];if(st==='มา')ma++;else if(st==='สาย')say++;else if(st==='ลา')la++;else if(st==='ขาด')kh++;if(st)tot++;});
        const pct=tot?Math.round((ma+say)/tot*100):0;rows.push(csvRow([s.no,s.firstName,s.lastName,ma,say,la,kh,ma+say,kh,tot,pct+'%']));
      });
    }
    rows.push('');
  });
  dlCSV(`เวลาเรียน_${mode==='daily'?'รายวัน':'สรุป'}_${cls.name}_${todayStr()}.csv`,rows);showToast('ดาวน์โหลดแล้ว ✓');
}

function deleteCls(cid){const c=getCls(cid);if(!confirm(`ลบห้อง "${c?.name}"?\nข้อมูลทั้งหมดจะหายไป`))return;db.classes=db.classes.filter(x=>x.id!==cid);const _tk=tk(cid);['students','subjects','attendance','assignments','scores','examScores'].forEach(k=>{delete db[k][_tk];});Object.keys(P).forEach(p=>{if(P[p].cls===cid){P[p].cls=db.classes[0]?.id||null;if(P[p].sub!==undefined)P[p].sub=null;}});save();renderStudents();showToast('ลบห้องเรียนแล้ว');}

function openAddSubject(cid,page){
  showMD(`<div class="mt"><i class="ti ti-book-plus"></i> เพิ่มวิชา — ${getCls(cid).name}</div>
    <div class="g2"><div class="fg" style="grid-column:span 2"><label class="fl">ชื่อวิชา</label><input type="text" id="mSN" placeholder="คณิตศาสตร์, ภาษาไทย" autofocus></div><div class="fg"><label class="fl">รหัสวิชา (ถ้ามี)</label><input type="text" id="mSC" placeholder="MA101"></div><div></div></div>
    <div class="prop-box" style="margin-top:4px">
      <div class="prop-title">สัดส่วนคะแนน (%)</div>
      <div class="prop-row"><label style="min-width:120px;font-size:13px">คะแนนเก็บ</label><input type="number" id="mWA" value="70" min="0" max="100" style="width:70px;font-size:14px" oninput="updPropBar()"> %</div>
      <div class="prop-row"><label style="min-width:120px;font-size:13px">คะแนนสอบ</label><input type="number" id="mWE" value="30" min="0" max="100" style="width:70px;font-size:14px" oninput="updPropBar()"> %</div>
      <div class="prop-bar" id="propBar"><div class="prop-seg" id="pBA" style="width:70%;background:var(--bl)">70% เก็บ</div><div class="prop-seg" id="pBE" style="width:30%;background:var(--tl)">30% สอบ</div></div>
      <div style="font-size:12px;color:var(--mu);margin-top:6px"><b>สัดส่วนคะแนนสอบ:</b></div>
      <div class="prop-row" style="margin-top:4px"><label style="min-width:120px;font-size:13px">กลางภาค</label><input type="number" id="mWM" value="50" min="0" max="100" style="width:70px;font-size:14px"> %</div>
      <div class="prop-row"><label style="min-width:120px;font-size:13px">ปลายภาค</label><input type="number" id="mWF" value="50" min="0" max="100" style="width:70px;font-size:14px"> %</div>
      <div class="prop-row"><label style="min-width:120px;font-size:13px">คะแนนเต็มกลางภาค</label><input type="number" id="mMM" value="100" min="1" style="width:70px;font-size:14px"> คะแนน</div>
      <div class="prop-row"><label style="min-width:120px;font-size:13px">คะแนนเต็มปลายภาค</label><input type="number" id="mFM" value="100" min="1" style="width:70px;font-size:14px"> คะแนน</div>
    </div>
    <div class="f g8" style="justify-content:flex-end;margin-top:8px"><button class="btn" onclick="closeMD()">ยกเลิก</button><button class="btn btn-t" onclick="submitAddSubject('${cid}','${page}')">เพิ่มวิชา</button></div>`);
}
function updPropBar(){
  const wA=parseInt(document.getElementById('mWA')?.value)||0;
  const wE=100-wA;
  const ba=document.getElementById('pBA'),be=document.getElementById('pBE');
  if(ba)ba.style.width=wA+'%',ba.textContent=wA+'% เก็บ';
  if(be)be.style.width=wE+'%',be.textContent=wE+'% สอบ';
  const mWE=document.getElementById('mWE');if(mWE)mWE.value=wE;
}
function submitAddSubject(cid,page){
  const name=val('mSN');if(!name)return;
  const wA=parseInt(val('mWA'))||70,wM=parseInt(val('mWM'))||50;
  const sub={id:uid(),name,code:val('mSC'),wAssign:wA,wExam:100-wA,wMid:wM,wFinal:100-wM,midMax:parseInt(val('mMM'))||100,finalMax:parseInt(val('mFM'))||100};
  if(!db.subjects[tk(cid)])db.subjects[tk(cid)]=[];
  db.subjects[tk(cid)].push(sub);save();closeMD();renderPage(page||'subjects');showToast('เพิ่มวิชาแล้ว');
}
function openEditSubject(cid,subid){
  const sub=getSub(cid,subid);
  const wA=sub.wAssign??70,wM=sub.wMid??50;
  showMD(`<div class="mt">แก้ไขวิชา — ${sub.name}</div>
    <div class="g2"><div class="fg" style="grid-column:span 2"><label class="fl">ชื่อวิชา</label><input type="text" id="mSN2" value="${sub.name}"></div><div class="fg"><label class="fl">รหัสวิชา</label><input type="text" id="mSC2" value="${sub.code||''}"></div><div></div></div>
    <div class="prop-box">
      <div class="prop-title">สัดส่วนคะแนน</div>
      <div class="prop-row"><label style="min-width:120px;font-size:13px">คะแนนเก็บ</label><input type="number" id="mWA2" value="${wA}" min="0" max="100" style="width:70px;font-size:14px"> %</div>
      <div class="prop-row"><label style="min-width:120px;font-size:13px">คะแนนสอบ</label><span style="font-size:14px;font-weight:700">${100-wA}%</span></div>
      <div class="prop-row"><label style="min-width:120px;font-size:13px">กลางภาค</label><input type="number" id="mWM2" value="${wM}" min="0" max="100" style="width:70px;font-size:14px"> %</div>
      <div class="prop-row"><label style="min-width:120px;font-size:13px">ปลายภาค</label><span style="font-size:14px;font-weight:700">${100-wM}%</span></div>
      <div class="prop-row"><label style="min-width:120px;font-size:13px">คะแนนเต็มกลางภาค</label><input type="number" id="mMM2" value="${sub.midMax||100}" style="width:70px;font-size:14px"></div>
      <div class="prop-row"><label style="min-width:120px;font-size:13px">คะแนนเต็มปลายภาค</label><input type="number" id="mFM2" value="${sub.finalMax||100}" style="width:70px;font-size:14px"></div>
    </div>
    <div class="f g8" style="justify-content:flex-end;margin-top:8px"><button class="btn" onclick="closeMD()">ยกเลิก</button><button class="btn btn-t" onclick="submitEditSubject('${cid}','${subid}')">บันทึก</button></div>`);
}
function submitEditSubject(cid,subid){
  const sub=getSub(cid,subid);if(!sub)return;
  const wA=parseInt(val('mWA2'))||70,wM=parseInt(val('mWM2'))||50;
  sub.name=val('mSN2')||sub.name;sub.code=val('mSC2');
  sub.wAssign=wA;sub.wExam=100-wA;sub.wMid=wM;sub.wFinal=100-wM;
  sub.midMax=parseInt(val('mMM2'))||100;sub.finalMax=parseInt(val('mFM2'))||100;
  save();closeMD();renderSubjects();
}
function deleteSubject(cid,subid){
  const sub=getSub(cid,subid);if(!confirm(`ลบวิชา "${sub?.name}"?\nข้อมูลทั้งหมดของวิชานี้จะหายไป`))return;
  db.subjects[tk(cid)]=(db.subjects[tk(cid)]||[]).filter(s=>s.id!==subid);
  const _attk=tk(cid);if(db.attendance[_attk])delete db.attendance[_attk][subid];
  if(db.assignments[tk(cid)])delete db.assignments[tk(cid)][subid];
  if(db.scores[tk(cid)])delete db.scores[tk(cid)][subid];
  if(db.examScores[tk(cid)])delete db.examScores[tk(cid)][subid];
  Object.keys(P).forEach(p=>{if(P[p].sub===subid)P[p].sub=null;});
  save();renderSubjects();showToast('ลบวิชาแล้ว');
}
function openAddStu(cid){
  showMD(`<div class="mt"><i class="ti ti-user-plus"></i> เพิ่มนักเรียน — ${getCls(cid).name}</div>
    <div class="g2"><div class="fg"><label class="fl">เลขที่</label><input type="number" id="mSno" min="1" placeholder="1"></div><div></div><div class="fg"><label class="fl">ชื่อ</label><input type="text" id="mSfn" placeholder="ชื่อ"></div><div class="fg"><label class="fl">นามสกุล</label><input type="text" id="mSln" placeholder="นามสกุล"></div></div>
    <div class="fg"><label class="fl">เพิ่มหลายคนพร้อมกัน (เลขที่ ชื่อ นามสกุล)</label><textarea id="mSbulk" rows="5" placeholder="1 สมชาย ใจดี&#10;2 สมหญิง มีสุข"></textarea></div>
    <div class="f g8" style="justify-content:flex-end"><button class="btn" onclick="closeMD()">ยกเลิก</button><button class="btn btn-p" onclick="submitAddStu('${cid}')">เพิ่ม</button></div>`);
}
function submitAddStu(cid){
  if(!db.students[tk(cid)])db.students[tk(cid)]=[];
  const bulk=document.getElementById('mSbulk')?.value?.trim();
  if(bulk){bulk.split('\n').filter(l=>l.trim()).forEach(line=>{const p=line.trim().split(/\s+/);if(p.length>=2)db.students[tk(cid)].push({id:uid(),no:parseInt(p[0])||db.students[tk(cid)].length+1,firstName:p[1],lastName:p.slice(2).join(' ')||''});});}
  else{const no=parseInt(document.getElementById('mSno')?.value)||db.students[tk(cid)].length+1,fn=val('mSfn');if(!fn)return;db.students[tk(cid)].push({id:uid(),no,firstName:fn,lastName:val('mSln')});}
  save();closeMD();renderStudents();showToast('เพิ่มนักเรียนแล้ว');
}
function openEditStu(cid,sid){const s=(db.students[tk(cid)]||[]).find(x=>x.id===sid);if(!s)return;showMD(`<div class="mt">แก้ไขนักเรียน</div><div class="g2"><div class="fg"><label class="fl">เลขที่</label><input type="number" id="eSno" value="${s.no}"></div><div></div><div class="fg"><label class="fl">ชื่อ</label><input type="text" id="eSfn" value="${s.firstName}"></div><div class="fg"><label class="fl">นามสกุล</label><input type="text" id="eSln" value="${s.lastName}"></div></div><div class="f g8" style="justify-content:flex-end"><button class="btn" onclick="closeMD()">ยกเลิก</button><button class="btn btn-p" onclick="submitEditStu('${cid}','${sid}')">บันทึก</button></div>`);}
function submitEditStu(cid,sid){const s=(db.students[tk(cid)]||[]).find(x=>x.id===sid);if(!s)return;s.no=parseInt(document.getElementById('eSno')?.value)||s.no;s.firstName=val('eSfn')||s.firstName;s.lastName=val('eSln');save();closeMD();renderStudents();}
function delStu(cid,sid){if(!confirm('ลบนักเรียนคนนี้?'))return;db.students[tk(cid)]=(db.students[tk(cid)]||[]).filter(x=>x.id!==sid);save();renderStudents();showToast('ลบนักเรียนแล้ว');}

/* ── INIT DB ── */
function _initDB(){
  if(!db.school)db.school={name:'',subdistrict:'',district:'',province:'',logo:''};
  if(!db.terms)db.terms=[];
  if(!db.examScores)db.examScores={};
  if(!db.studentPasswords)db.studentPasswords={};
  if(!db.submitStatus)db.submitStatus={};
  if(!db.timetable)db.timetable={};
  // 5 ส
  if(!db.fiveS)db.fiveS={items:['สะสาง','สะดวก','สะอาด','สร้างมาตรฐาน','สร้างวินัย'],groups:{},checks:{}};
  if(!db.fiveS.items||!db.fiveS.items.length)db.fiveS.items=['สะสาง','สะดวก','สะอาด','สร้างมาตรฐาน','สร้างวินัย'];
  if(!db.fiveS.groups)db.fiveS.groups={};
  if(!db.fiveS.checks)db.fiveS.checks={};
  // ถ้ามี db.periods เก็บไว้ ให้ใช้แทน PERIODS default
  if(db.periods&&Array.isArray(db.periods)&&db.periods.length){
    PERIODS.length=0;
    db.periods.forEach(p=>PERIODS.push({...p}));
  }
  if(!db.terms.length){
    const now=new Date(),thYear=now.getFullYear()+543;
    const sem=(now.getMonth()<4)?2:1;
    const id=uid();
    db.terms.push({id,year:thYear,semester:sem,label:thYear+' ภาค '+sem,isCurrent:true});
    save();
  }
  const cur=db.terms.find(t=>t.isCurrent);
  currentTermId=cur?cur.id:(db.terms[0]?.id||null);
}

/* ── REALTIME SUBSCRIPTION ── */
function _setupRealtime(){
  const channel=sb.channel('schools-changes')
    .on('postgres_changes',{
      event:'UPDATE',
      schema:'public',
      table:'schools',
      filter:'id=eq.'+SCHOOL_ID
    },payload=>{
      // Echo protection: ถ้าตัวเราเพิ่งบันทึก (ภายใน 2 วินาที) ข้าม
      if(Date.now()-_lastSaveTime<2000)return;
      const newData=payload.new?.data;
      if(!newData||!(newData.classes||newData.school||newData.terms))return;
      // Merge เข้า db
      db=newData;
      _initDB();
      try{localStorage.setItem('crDB4',JSON.stringify(db));}catch(e){}
      // Re-render หน้าปัจจุบัน
      const cur=curPage();
      if(cur){
        renderPage(cur);
        updateSidebarLogo();
      }
      // แสดง notification เล็กๆ
      const s=document.getElementById('sync-status');
      if(s){s.textContent='🔄 อัปเดตจากที่อื่น';s.style.color='var(--tl)';setTimeout(()=>{if(s)s.textContent='';},3000);}
    })
    .subscribe(status=>{
      console.log('Realtime status:',status);
    });
  return channel;
}

/* ── INIT ── */
load().then(()=>{
  updateSidebarLogo();
  renderSchool();
  renderDash();
  _setupRealtime();
});
</script>
