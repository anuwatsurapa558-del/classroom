<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{
  --bg:#F0FDFA;--sf:#fff;--s2:#CCFBF1;--s3:#99F6E4;
  --bd:rgba(0,0,0,0.09);--bmd:rgba(0,0,0,0.15);
  --tx:#134E4A;--mu:#0F766E;--hn:#5EEAD4;
  --tl:#0D9488;--tll:#CCFBF1;--tld:#0F766E;
  --gn:#16A34A;--gnl:#DCFCE7;
  --rd:#DC2626;--rdl:#FEE2E2;
  --am:#D97706;--aml:#FEF3C7;
  --bl:#2563EB;--bll:#EFF6FF;
  --pu:#7C3AED;--pul:#EDE9FE;
  --r:10px;--rl:14px;
  --sh:0 2px 8px rgba(13,148,136,0.08),0 1px 3px rgba(0,0,0,0.06);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow-x:hidden;}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--tx);font-size:15px;line-height:1.6;}

/* HEADER */
.header{background:linear-gradient(135deg,var(--tl),var(--tld));color:#fff;padding:0;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(13,148,136,0.3);}
.header-inner{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;}
.header h1{font-size:17px;font-weight:700;}
.header p{font-size:11px;opacity:.8;margin-top:1px;}
.header-right{display:flex;align-items:center;gap:8px;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.4);}
.sync-dot.ok{background:#4ADE80;}

/* TABS */
.nav-tabs{background:rgba(0,0,0,0.15);display:flex;padding:0 18px;}
.nav-tab{flex:1;padding:10px 4px;border:none;background:none;color:rgba(255,255,255,0.7);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;white-space:nowrap;}
.nav-tab.active{color:#fff;border-bottom-color:#fff;font-weight:700;}

/* CONTENT */
.content{max-width:680px;margin:0 auto;padding:16px;}

/* LOGIN SCREEN */
.login-box{background:var(--sf);border-radius:16px;padding:28px 24px;box-shadow:var(--sh);max-width:420px;margin:24px auto;}
.login-logo{text-align:center;margin-bottom:20px;}
.login-logo i{font-size:48px;color:var(--tl);display:block;}
.login-logo h2{font-size:20px;font-weight:700;color:var(--tx);margin-top:8px;}
.login-logo p{font-size:13px;color:var(--mu);margin-top:4px;}

/* CARDS */
.card{background:var(--sf);border-radius:var(--rl);box-shadow:var(--sh);margin-bottom:14px;overflow:hidden;}
.card-hd{padding:14px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;}
.card-hd-title{font-size:14px;font-weight:700;color:var(--tx);}
.card-bd{padding:14px 16px;}

/* PROFILE CARD */
.profile-card{background:linear-gradient(135deg,var(--tl),var(--tld));color:#fff;border-radius:var(--rl);padding:20px;margin-bottom:14px;box-shadow:var(--sh);}
.profile-name{font-size:20px;font-weight:700;margin-top:8px;}
.profile-info{font-size:13px;opacity:.85;margin-top:2px;}

/* STATS GRID */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px;margin-bottom:14px;}
.sc{background:var(--sf);border-radius:var(--r);padding:12px;box-shadow:var(--sh);text-align:center;}
.sl{font-size:10px;color:var(--mu);font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.sv{font-size:22px;font-weight:800;line-height:1.2;margin-top:2px;}

/* BADGE */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;}
.bg{background:var(--gnl);color:var(--gn);}
.br{background:var(--rdl);color:var(--rd);}
.ba{background:var(--aml);color:var(--am);}
.bb{background:var(--bll);color:var(--bl);}
.bt{background:var(--tll);color:var(--tl);}
.bx{background:#F1F5F9;color:#64748B;}
.bp{background:var(--pul);color:var(--pu);}

/* TABLE */
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--mu);padding:8px 10px;border-bottom:1px solid var(--bd);background:var(--s2);white-space:nowrap;}
td{padding:8px 10px;border-bottom:1px solid var(--bd);vertical-align:middle;}
tr:last-child td{border-bottom:none;}

/* FORM */
.fg{margin-bottom:12px;}
.fl{display:block;font-size:13px;font-weight:600;margin-bottom:4px;color:var(--tx);}
input[type=text],input[type=number],select{width:100%;padding:10px 12px;border:1.5px solid var(--bmd);border-radius:8px;font-family:inherit;font-size:16px;color:var(--tx);background:var(--sf);outline:none;transition:border-color .12s;}
input:focus,select:focus{border-color:var(--tl);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:10px 18px;border-radius:8px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .12s;touch-action:manipulation;}
.btn-tl{background:var(--tl);color:#fff;}
.btn-tl:active{opacity:.8;}
.btn-sm{padding:6px 12px;font-size:13px;}
.btn-outline{background:none;border:1.5px solid var(--tl);color:var(--tl);}
.btn-full{width:100%;justify-content:center;}

/* GRADE */
.grade{display:inline-block;padding:4px 12px;border-radius:20px;font-size:15px;font-weight:800;}
.g4{background:#14532D;color:#fff;}
.g35{background:var(--gnl);color:#14532D;}
.g3{background:var(--gnl);color:var(--gn);}
.g25{background:var(--bll);color:var(--bl);}
.g2{background:var(--bll);color:var(--bl);}
.g15{background:var(--aml);color:var(--am);}
.g1{background:var(--aml);color:var(--am);}
.g0{background:var(--rdl);color:var(--rd);}

/* PROGRESS */
.prog{height:8px;background:var(--s2);border-radius:4px;overflow:hidden;margin-top:6px;}
.pf{height:100%;border-radius:4px;transition:width .5s;}

/* ATT ROW */
.att-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--bd);}
.att-row:last-child{border-bottom:none;}
.att-date{flex:1;font-size:13.5px;}
.att-status{font-weight:700;}

/* EMPTY */
.empty{padding:32px;text-align:center;color:var(--mu);}
.empty i{font-size:32px;margin-bottom:8px;display:block;}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:#134E4A;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;z-index:500;opacity:0;transition:all .22s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* PASSWORD */
input[type=password]{width:100%;padding:10px 12px;border:1.5px solid var(--bmd);border-radius:8px;font-family:inherit;font-size:20px;color:var(--tx);background:var(--sf);outline:none;transition:border-color .12s;letter-spacing:4px;text-align:center;}
input[type=password]:focus{border-color:var(--tl);}
.pw-dots{display:flex;justify-content:center;gap:10px;margin:10px 0;}
.pw-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--tl);background:transparent;transition:background .15s;}
.pw-dot.filled{background:var(--tl);}
.err-box{background:var(--rdl);border:1px solid rgba(220,38,38,.2);border-radius:8px;padding:10px 14px;font-size:12.5px;color:var(--rd);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.ok-box{background:var(--gnl);border:1px solid rgba(22,163,74,.2);border-radius:8px;padding:10px 14px;font-size:12.5px;color:var(--gn);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.pw-strength{height:4px;border-radius:2px;margin-top:4px;transition:all .3s;}
.pw-toggle{position:relative;}
.pw-toggle input{padding-right:44px;}
.pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--mu);font-size:18px;background:none;border:none;}

/* STUDENT PICKER LIST */
.stu-picker{max-height:280px;overflow-y:auto;-webkit-overflow-scrolling:touch;border:1.5px solid var(--bmd);border-radius:10px;margin-top:6px;}
.stu-pick-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .12s;}
.stu-pick-item:last-child{border-bottom:none;}
.stu-pick-item:active,.stu-pick-item.sel{background:var(--tll);}
.stu-pick-item.sel{border-left:4px solid var(--tl);}
.stu-pick-no{width:32px;height:32px;border-radius:50%;background:var(--s2);color:var(--tld);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.stu-pick-name{flex:1;font-size:14px;}
.stu-pick-check{color:var(--tl);font-size:20px;}
.stu-search{margin-top:8px;}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--mu);gap:10px;font-size:14px;}
.spinner{width:20px;height:20px;border:2px solid var(--s3);border-top-color:var(--tl);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* SUBJECT TABS */
.sub-tabs{display:flex;gap:4px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;}
.sub-tabs::-webkit-scrollbar{display:none;}
.sub-tab{padding:6px 14px;border-radius:20px;border:1.5px solid var(--bd);background:none;font-family:inherit;font-size:12.5px;font-weight:500;color:var(--mu);cursor:pointer;white-space:nowrap;transition:all .12s;}
.sub-tab.active{background:var(--tl);color:#fff;border-color:var(--tl);}

@media(max-width:480px){
  .content{padding:12px;}
  .login-box{margin:12px;padding:22px 18px;}
}
</style>

<script>
const SUPABASE_URL='https://omloppaqblbpaedjvdzs.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tbG9wcGFxYmxicGFlZGp2ZHpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MzAxMjUsImV4cCI6MjA5OTAwNjEyNX0.p15ohyywiVimBHVaslai4LtFEJFqiwUKpyo2JN0r1ug';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const SCHOOL_ID='main';

let db={classes:[],students:{},subjects:{},attendance:{},assignments:{},scores:{},examScores:{}};
let me=null; // {classId, studentId}
let currentTab='home';
let currentSubject=null;

/* ── HELPERS ── */
function todayStr(){return new Date().toISOString().split('T')[0];}
function thDate(d){
  const mo=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const[y,m,day]=d.split('-');return`${+day} ${mo[+m-1]} ${+y+543}`;
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function setSync(state){const d=document.getElementById('syncDot');if(d){d.className='sync-dot'+(state==='ok'?' ok':'');}}

/* ── GRADE ── */
function calcGrade(pct){
  if(pct>=80)return{g:'4',cls:'g4'};if(pct>=75)return{g:'3.5',cls:'g35'};
  if(pct>=70)return{g:'3',cls:'g3'};if(pct>=65)return{g:'2.5',cls:'g25'};
  if(pct>=60)return{g:'2',cls:'g2'};if(pct>=55)return{g:'1.5',cls:'g15'};
  if(pct>=50)return{g:'1',cls:'g1'};return{g:'0',cls:'g0'};
}
function calcTotal(cid,subid,stuId){
  const sub=subArr(cid).find(s=>s.id===subid);if(!sub)return{assignPct:0,examPct:0,totalPct:0,grade:{g:'0',cls:'g0'}};
  const wA=sub.wAssign??70,wE=sub.wExam??30,wM=sub.wMid??50,wF=sub.wFinal??50;
  const asgs=(asgBlock(cid)[subid])||[];
  let raw=0,max=0;
  asgs.forEach(a=>{const v=((scBlock(cid)[subid]||{})[a.id]||{})[stuId];if(v!==undefined&&v!==''){raw+=parseFloat(v);max+=a.maxScore;}});
  const assignPct=max?raw/max*100:0;
  const ex=((exBlock(cid)[subid])||{})[stuId]||{};
  const midMax=sub.midMax||100,finMax=sub.finalMax||100;
  const midRaw=ex.mid!==undefined?parseFloat(ex.mid):null;
  const finRaw=ex.final!==undefined?parseFloat(ex.final):null;
  const midPct=midRaw!==null?midRaw/midMax*100:null;
  const finPct=finRaw!==null?finRaw/finMax*100:null;
  let examPct=0;
  if(midPct!==null&&finPct!==null)examPct=midPct*(wM/100)+finPct*(wF/100);
  else if(midPct!==null)examPct=midPct;else if(finPct!==null)examPct=finPct;
  const totalPct=assignPct*(wA/100)+examPct*(wE/100);
  return{assignPct:Math.round(assignPct*10)/10,examPct:Math.round(examPct*10)/10,totalPct:Math.round(totalPct*10)/10,grade:calcGrade(totalPct),midRaw,finRaw,midPct,finPct,midMax,finMax};
}

/* ── LOAD DATA ── */
const DAYS_TH=['จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์','อาทิตย์'];
const DAY_COLORS=['#FEF3C7','#FCE7F3','#DBEAFE','#FED7AA','#DCFCE7','#E9D5FF','#FEE2E2'];
function ttGet(cid){
  const cls2=db.classes.find(c=>c.id===cid);
  const tkey=(cls2&&cls2.termId)?cls2.termId+'__'+cid:cid;
  return (db.timetable&&db.timetable[tkey])||[];
}

function updateHeaderSchool(){
  const sch=db.school||{};
  const nameEl=document.getElementById('hdrName');
  const logoEl=document.getElementById('hdrLogo');
  if(nameEl)nameEl.textContent=sch.name||'ClassRoom';
  if(logoEl)logoEl.innerHTML=sch.logo
    ?`<img src="${sch.logo}" style="width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.4)">`
    :'<span style="font-size:22px">📚</span>';
}
function _normalizeDB(){
  if(!db.examScores)db.examScores={};
  if(!db.studentPasswords)db.studentPasswords={};
  if(!db.school)db.school={};
  if(!db.terms)db.terms=[];
  // ตั้ง currentTermId จาก term ที่ isCurrent
  const cur=db.terms.find(t=>t.isCurrent);
  window._currentTermId=cur?cur.id:(db.terms[0]?.id||null);
  updateHeaderSchool();
}

async function loadData(){
  try{
    const {data,error}=await sb.from('schools').select('data').eq('id',SCHOOL_ID).single();
    if(error){console.error('Load error:',error);throw error;}
    if(data&&data.data&&(data.data.classes||data.data.school||data.data.terms)){
      db=data.data;
      _normalizeDB();
      setSync('ok');return true;
    }
  }catch(e){setSync('');console.error('Network:',e);}
  try{
    const x=localStorage.getItem('crDB4');
    if(x){db=JSON.parse(x);_normalizeDB();return true;}
  }catch(e){}
  return false;
}

/* ── TERM KEY HELPER ──
   ข้อมูลในระบบครูเก็บด้วย key = "termId__classId"
   ฟังก์ชัน tk(cid) คืนค่า key ที่ถูกต้องโดยหา termId จาก db.classes
── */
function tk(cid){
  const cls2=db.classes.find(c=>c.id===cid);
  if(cls2&&cls2.termId) return cls2.termId+'__'+cid;
  // fallback: ลอง currentTermId จากระบบครู
  if(window._currentTermId) return window._currentTermId+'__'+cid;
  return cid;
}
// ย่อการเข้าถึงข้อมูล
function stuArr(cid){return db.students[tk(cid)]||db.students[cid]||[];}
function subArr(cid){return db.subjects[tk(cid)]||db.subjects[cid]||[];}
function attBlock(cid){return db.attendance[tk(cid)]||db.attendance[cid]||{};}
function asgBlock(cid){return db.assignments[tk(cid)]||db.assignments[cid]||{};}
function scBlock(cid){return db.scores[tk(cid)]||db.scores[cid]||{};}
function exBlock(cid){return db.examScores[tk(cid)]||db.examScores[cid]||{};}

/* ── SAVE STUDENT SELF-REGISTRATION ── */
async function saveStudentInfo(cid,stuId,studentObj,pwPlain){
  // ป้องกันข้อมูลหาย: โหลดล่าสุดจาก cloud ก่อน แล้ว merge เฉพาะข้อมูลตัวเอง
  // (กันกรณีหลายคนลงทะเบียนพร้อมกัน — race condition)
  try{
    const {data,error}=await sb.from('schools').select('data').eq('id',SCHOOL_ID).single();
    if(error)throw error;
    if(data&&data.data&&data.data.classes){
      db=data.data;
      _normalizeDB();
    }
  }catch(e){console.error('Load fresh error:',e);/* ใช้ db ในเครื่องต่อ */}

  // หา key ที่ถูกต้องของห้องนี้
  const cls2=db.classes.find(x=>x.id===cid);
  const tkey=(cls2&&cls2.termId)?cls2.termId+'__'+cid:(window._currentTermId?window._currentTermId+'__'+cid:cid);

  // เพิ่ม/อัปเดตนักเรียนของตัวเองเข้าไปใน db ล่าสุด
  if(studentObj){
    if(!db.students[tkey])db.students[tkey]=[];
    const existing=db.students[tkey].findIndex(s=>s.id===stuId);
    if(existing>=0) db.students[tkey][existing]=studentObj; // อัปเดต
    else db.students[tkey].push(studentObj); // เพิ่มใหม่
  }
  // เพิ่มรหัสผ่านของตัวเอง
  if(pwPlain!==undefined&&pwPlain!==null){
    if(!db.studentPasswords)db.studentPasswords={};
    db.studentPasswords[stuId]=pwPlain;
  }

  // บันทึก db ที่ merge แล้วขึ้น cloud
  try{
    const {error}=await sb.from('schools').update({data:db,updated_at:new Date().toISOString()}).eq('id',SCHOOL_ID);
    if(error)throw error;
    _lastSaveTime=Date.now(); // กัน echo
    setSync('ok');
  }catch(e){setSync('');console.error('Save error:',e);}
  localStorage.setItem('crDB4',JSON.stringify(db));
}

/* ── PASSWORD (plaintext เพื่อให้ครูดูได้) ── */
/* ── SESSION ── */
function saveSession(){localStorage.setItem('stuSession',JSON.stringify(me));}
function loadSession(){try{const s=localStorage.getItem('stuSession');if(s){const m=JSON.parse(s);if(m&&m.classId&&m.studentId)return m;}}catch(e){}return null;}

/* รหัสผ่านเก็บแบบ plaintext ใน db.studentPasswords = { studentId: password } */
function getPw(sid){return(db.studentPasswords||{})[sid]||'';}
async function setPwHash(sid,pw){
  // ยังคงใช้ชื่อ setPwHash เพื่อความเข้ากันได้ แต่เก็บ plaintext
  if(!db.studentPasswords)db.studentPasswords={};
  db.studentPasswords[sid]=pw;
}
async function checkPw(sid,pw){
  const stored=getPw(sid);
  if(!stored)return true; // ยังไม่มีรหัส = ผ่าน (ต้องตั้งรหัสก่อน)
  return stored===pw;
}
function hasPw(sid){return !!(db.studentPasswords||{})[sid];}

/* ── REAL-TIME SUBSCRIPTION ── */
let _rtChannel=null;
let _lastSaveTime=0;

function startRealtime(){
  if(_rtChannel)return;
  _rtChannel=sb.channel('school-changes-student')
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'schools',filter:'id=eq.'+SCHOOL_ID},
      payload=>{
        // ถ้าเพิ่งบันทึกไปเอง (ภายใน 2 วิ) ให้ข้าม
        if(Date.now()-_lastSaveTime<2000)return;
        const newData=payload.new?.data;
        if(!newData||typeof newData!=='object')return;
        db=newData;
        _normalizeDB();
        try{localStorage.setItem('crDB4',JSON.stringify(db));}catch(e){}
        // Re-render หน้าที่กำลังดู (ถ้า login แล้ว)
        if(me){
          // อัปเดตทั้งหน้า (รวม tab visibility ตาม cls.showGrades ใหม่)
          renderApp();
        }
        showToast('🔄 มีการอัปเดตใหม่');
      })
    .subscribe();
  console.log('Realtime subscribed (student)');
}

async function init(){
  const ok=await loadData();
  const sess=loadSession();
  if(sess&&stuArr(sess.classId).length>0){
    const stu=stuArr(sess.classId).find(s=>s.id===sess.studentId);
    if(stu){me=sess;renderApp();return;}
  }
  renderLogin();
  startRealtime();
}

let _loginStuId=null;
function updateLoginStuList(){
  const cid=document.getElementById('loginCls')?.value;
  const wrap=document.getElementById('stuPickWrap');
  const pwWrap=document.getElementById('loginPwWrap');
  const btn=document.getElementById('loginBtn');
  _loginStuId=null;
  if(!cid){wrap.style.display='none';pwWrap.style.display='none';btn.style.display='none';return;}
  wrap.style.display='block';
  renderStuPickList(cid,'');
}
function renderStuPickList(cid,filter){
  const picker=document.getElementById('stuPicker');if(!picker)return;
  const stus=stuArr(cid).slice().sort((a,b)=>a.no-b.no);
  const f=(filter||'').toLowerCase().trim();
  const filtered=f?stus.filter(s=>(`${s.no} ${s.firstName} ${s.lastName}`).toLowerCase().includes(f)):stus;
  if(!filtered.length){
    picker.innerHTML=`<div style="padding:20px;text-align:center;color:var(--mu);font-size:13px">${stus.length?'ไม่พบชื่อที่ค้นหา':'ยังไม่มีนักเรียนในห้องนี้ กดลงทะเบียนด้านล่าง'}</div>`;
    return;
  }
  picker.innerHTML=filtered.map(s=>`
    <div class="stu-pick-item${s.id===_loginStuId?' sel':''}" onclick="pickLoginStu('${s.id}')">
      <div class="stu-pick-no">${s.no}</div>
      <div class="stu-pick-name">${s.firstName} ${s.lastName}</div>
      ${s.id===_loginStuId?'<i class="ti ti-circle-check stu-pick-check"></i>':''}
    </div>`).join('');
}
function filterStuList(){
  const cid=document.getElementById('loginCls')?.value;
  const f=document.getElementById('stuSearch')?.value||'';
  renderStuPickList(cid,f);
}
function pickLoginStu(sid){
  _loginStuId=sid;
  const cid=document.getElementById('loginCls')?.value;
  renderStuPickList(cid,document.getElementById('stuSearch')?.value||'');
  document.getElementById('loginPwWrap').style.display='block';
  document.getElementById('loginBtn').style.display='flex';
  // ถ้ายังไม่มีรหัส แสดงข้อความ

  } else {
    if(errEl)errEl.innerHTML='';
  }
  setTimeout(()=>document.getElementById('loginPw')?.focus(),100);
}

async function doLogin(){
  const cid=document.getElementById('loginCls')?.value;
  const sid=_loginStuId;
  const pw=(document.getElementById('loginPw')?.value||'').trim();
  const errEl=document.getElementById('loginErr');
  if(!cid||!sid){if(errEl)errEl.innerHTML=`<div class="err-box"><i class="ti ti-alert-circle"></i>กรุณาเลือกห้องและชื่อ</div>`;return;}
  // ถ้ายังไม่มีรหัส → ไปตั้งรหัสก่อน
  if(!hasPw(sid)){renderSetPassword(cid,sid,false);return;}
  if(!pw){if(errEl)errEl.innerHTML=`<div class="err-box"><i class="ti ti-lock"></i>กรุณากรอกรหัสผ่าน</div>`;return;}
  const ok=await checkPw(sid,pw);

    if(errEl)errEl.innerHTML=`<div class="err-box"><i class="ti ti-lock-x"></i>รหัสผ่านไม่ถูกต้อง</div>`;

    return;
  }
  me={classId:cid,studentId:sid};saveSession();renderApp();
}

function goHome(){switchTab("home");}
function switchTab(tab,btn){
  currentTab=tab;
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  renderTab(tab);
}

function renderTab(tab){
  if(tab==='home')renderHome();
  else if(tab==='attendance')renderAttendance();
  else if(tab==='assignments')renderAssignments();
  else if(tab==='grades')renderGrades();
}

/* ── HOME ── */
function renderHome(){
  const stu=stuArr(me.classId).find(s=>s.id===me.studentId);
  const cls=db.classes.find(c=>c.id===me.classId);
  const subs=subArr(me.classId);
  const cid=me.classId,sid=me.studentId;

  // attendance overall
  let allMa=0,allTot=0;
  subs.forEach(sub=>{
    const dates=Object.keys((attBlock(cid)[sub.id])||{});
    dates.forEach(d=>{const st=((attBlock(cid)[sub.id]||{})[d]||{})[sid];if(st==='มา'||st==='สาย')allMa++;if(st)allTot++;});
  });
  const attRate=allTot?Math.round(allMa/allTot*100):0;

  let html=`
  <div class="profile-card">
    <div><i class="ti ti-user-circle" style="font-size:32px;opacity:.8"></i></div>
    <div class="profile-name">${stu.firstName} ${stu.lastName}</div>
    <div class="profile-info">เลขที่ ${stu.no} • ห้อง ${cls.name}</div>
    <div style="margin-top:12px"><button class="btn btn-sm" style="background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.3)" onclick="editMyInfo()"><i class="ti ti-edit"></i> แก้ไขข้อมูล</button> <button class="btn btn-sm" style="background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3)" onclick="logout()"><i class="ti ti-logout"></i> ออกจากระบบ</button></div>
  </div>
  <div class="sg">
    <div class="sc"><div class="sl">วิชา</div><div class="sv" style="color:var(--tl)">${subs.length}</div></div>
    <div class="sc"><div class="sl">มาเรียน%</div><div class="sv" style="color:${attRate>=80?'var(--gn)':attRate>=60?'var(--am)':'var(--rd)'}">${attRate}%</div></div>
    <div class="sc"><div class="sl">ครั้งมา</div><div class="sv" style="color:var(--gn)">${allMa}</div></div>
    <div class="sc"><div class="sl">ครั้งเรียน</div><div class="sv" style="color:var(--mu)">${allTot}</div></div>
  </div>`;

  // ── ตารางเรียนวันนี้ ──
  const tt=ttGet(cid);
  if(tt.length){
    const now=new Date();
    const jsDay=now.getDay();
    const day=jsDay===0?6:jsDay-1;
    const todayItems=tt.filter(t=>t.day===day).sort((a,b)=>a.start.localeCompare(b.start));
    if(todayItems.length){
      const curTime=(now.getHours()+'').padStart(2,'0')+':'+(now.getMinutes()+'').padStart(2,'0');
      html+=`<div class="card" style="margin-bottom:14px"><div class="card-hd"><div class="card-hd-title"><i class="ti ti-calendar-time"></i> วันนี้ (${DAYS_TH[day]}) — ${todayItems.length} คาบ</div></div><div class="card-bd" style="padding:0">`;
      todayItems.forEach(item=>{
        const name=item.isActivity?item.activityName:(subs.find(s=>s.id===item.subId)?.name||'—');
        const isNow=(curTime>=item.start&&curTime<item.end);
        const isPast=(curTime>=item.end);
        const bg=isNow?'var(--gnl)':isPast?'var(--sf2)':item.isActivity?'#FEF3C7':'#fff';
        const bcol=isNow?'var(--gn)':isPast?'var(--mu)':item.isActivity?'#F59E0B':'var(--tl)';
        const tag=isNow?'<span class="badge bg" style="margin-left:6px">กำลังเรียน</span>':isPast?'<span class="badge bx" style="margin-left:6px">จบแล้ว</span>':'';
        html+=`<div style="padding:10px 14px;border-bottom:1px solid var(--bd);background:${bg};border-left:3px solid ${bcol};display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-weight:700;color:${isPast?'var(--mu)':'var(--tx)'}">${item.isActivity?'★ ':''}${name}${tag}</div>
            ${item.note?`<div style="font-size:11px;color:var(--mu)">${item.note}</div>`:''}
          </div>
          <div style="font-size:12px;color:var(--mu);text-align:right">${item.start.slice(0,5)}<br>${item.end.slice(0,5)}</div>
        </div>`;
      });
      html+=`</div></div>`;
    }
  }

  // ── งานใกล้กำหนดส่ง ──
  const today=new Date();today.setHours(0,0,0,0);
  const upcoming=[];
  subs.forEach(sub=>{
    const asgs=(asgBlock(cid)[sub.id])||[];
    asgs.forEach(a=>{
      if(!a.dueDate)return;
      // เช็คว่ายังไม่ส่ง
      const v=((scBlock(cid)[sub.id]||{})[a.id]||{})[sid];
      const sent=(a.type==='track')?(v==='ตรงเวลา'||v==='ส่งช้า'):(v!==undefined&&v!==''&&!isNaN(parseFloat(v)));
      if(sent)return;
      const due=new Date(a.dueDate);due.setHours(0,0,0,0);
      const days=Math.round((due-today)/(1000*60*60*24));
      if(days>=-3&&days<=7)upcoming.push({sub,asg:a,days});
    });
  });
  upcoming.sort((a,b)=>a.days-b.days);
  if(upcoming.length){
    // แยก overdue กับ upcoming
    const overdue=upcoming.filter(u=>u.days<0);
    const today0=upcoming.filter(u=>u.days===0);
    const soon=upcoming.filter(u=>u.days>0);
    let alertHtml='';
    if(overdue.length){
      alertHtml+=`<div class="card" style="border:2px solid var(--rd);margin-bottom:14px"><div class="card-hd" style="background:var(--rdl);border-bottom:1px solid var(--rd)"><div class="card-hd-title" style="color:var(--rd)"><i class="ti ti-alert-triangle"></i> เลยกำหนดส่งแล้ว! (${overdue.length} งาน)</div></div><div class="card-bd" style="padding:0">`;
      overdue.forEach(u=>{
        alertHtml+=`<div style="padding:10px 14px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center"><div><b>${u.asg.name}</b><div style="font-size:11.5px;color:var(--mu)">${u.sub.name} • ${thDate(u.asg.dueDate)}</div></div><span class="badge br">เลย ${-u.days} วัน</span></div>`;
      });
      alertHtml+=`</div></div>`;
    }
    if(today0.length){
      alertHtml+=`<div class="card" style="border:2px solid var(--am);margin-bottom:14px"><div class="card-hd" style="background:var(--aml);border-bottom:1px solid var(--am)"><div class="card-hd-title" style="color:var(--am)"><i class="ti ti-clock-hour-4"></i> ครบกำหนดวันนี้! (${today0.length} งาน)</div></div><div class="card-bd" style="padding:0">`;
      today0.forEach(u=>{
        alertHtml+=`<div style="padding:10px 14px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center"><div><b>${u.asg.name}</b><div style="font-size:11.5px;color:var(--mu)">${u.sub.name}</div></div><span class="badge ba">วันนี้!</span></div>`;
      });
      alertHtml+=`</div></div>`;
    }
    if(soon.length){
      alertHtml+=`<div class="card" style="border:2px solid var(--tl);margin-bottom:14px"><div class="card-hd" style="background:var(--tll);border-bottom:1px solid var(--tl)"><div class="card-hd-title" style="color:var(--tl)"><i class="ti ti-calendar-clock"></i> งานที่ต้องส่งเร็วๆ นี้ (${soon.length} งาน)</div></div><div class="card-bd" style="padding:0">`;
      soon.forEach(u=>{
        const dt=u.days===1?'พรุ่งนี้':`อีก ${u.days} วัน`;

      });
      alertHtml+=`</div></div>`;
    }
    html+=alertHtml;
  }

  // Summary per subject
  if(subs.length){
    html+=`<div class="card"><div class="card-hd"><div class="card-hd-title">สรุปรายวิชา</div></div>`;

        }else{

        }
      });
      const asgPct=asgs.length?Math.round(sent/asgs.length*100):0;

      const dates=Object.keys((attBlock(cid)[sub.id])||{});
      let ma=0,tot=0;dates.forEach(d=>{const st=((attBlock(cid)[sub.id]||{})[d]||{})[sid];if(st==='มา'||st==='สาย')ma++;if(st)tot++;});

/* ── ASSIGNMENTS ── */
function renderAssignments(){
  const cid=me.classId,sid=me.studentId;
  const subs=subArr(cid);
  if(!currentSubject||!subs.find(s=>s.id===currentSubject))currentSubject=subs[0]?.id||null;

  let html=``;
  if(subs.length>1){
    html+=`<div class="sub-tabs">`;
    subs.forEach(sub=>{html+=`<button class="sub-tab${sub.id===currentSubject?' active':''}" onclick="currentSubject='${sub.id}';renderAssignments()">${sub.name}</button>`;});
    html+=`</div>`;
  }
  if(!currentSubject){document.getElementById('mainContent').innerHTML=html+`<div class="card"><div class="empty"><i class="ti ti-book-off"></i><div>ยังไม่มีวิชา</div></div></div>`;return;}

  const sub=subs.find(s=>s.id===currentSubject);
  const asgs=(asgBlock(cid)[currentSubject])||[];

  // คำนวณสถานะแต่ละงาน
  function statusOf(a){
    const v=((scBlock(cid)[currentSubject]||{})[a.id]||{})[sid];
    if(a.type==='track'){
      if(v==='ตรงเวลา')return 'ontime';
      if(v==='ส่งช้า')return 'late';
      return 'none';
    } else {
      // งานคะแนน: มีคะแนน = ส่งแล้ว (ตรงเวลา) ยังไม่มี = ยังไม่ส่ง
      const has=(v!==undefined&&v!==''&&!isNaN(parseFloat(v)));
      return has?'ontime':'none';
    }
  }

  let cOntime=0,cLate=0,cNone=0;
  asgs.forEach(a=>{const st=statusOf(a);if(st==='ontime')cOntime++;else if(st==='late')cLate++;else cNone++;});

  html+=`<div class="sg">
    <div class="sc"><div class="sl">งานทั้งหมด</div><div class="sv" style="color:var(--tl)">${asgs.length}</div></div>
    <div class="sc"><div class="sl">ส่งตรงเวลา</div><div class="sv" style="color:var(--gn)">${cOntime}</div></div>
    <div class="sc"><div class="sl">ส่งช้า</div><div class="sv" style="color:var(--or)">${cLate}</div></div>
    <div class="sc"><div class="sl">ยังไม่ส่ง</div><div class="sv" style="color:var(--rd)">${cNone}</div></div>
  </div>`;

  if(!asgs.length){
    html+=`<div class="card"><div class="empty"><i class="ti ti-clipboard-list"></i><div>ยังไม่มีงาน</div><p>รอครูสั่งงาน</p></div></div>`;
    document.getElementById('mainContent').innerHTML=html;return;
  }

  // รายการงานทั้งหมด เรียงตามกำหนดส่ง
  const sorted=asgs.slice().sort((a,b)=>{
    if(a.dueDate&&b.dueDate)return a.dueDate.localeCompare(b.dueDate);
    if(a.dueDate)return -1;if(b.dueDate)return 1;return 0;
  });

  html+=`<div class="card"><div class="card-hd"><div class="card-hd-title">รายการงาน (${asgs.length} งาน)</div></div><div class="card-bd" style="padding:0">`;
  sorted.forEach(a=>{
    const st=statusOf(a);
    let badge,bcol;
    if(st==='ontime'){badge='<span class="badge bg"><i class="ti ti-check"></i> ส่งแล้ว</span>';bcol='var(--gn)';}
    else if(st==='late'){badge='<span class="badge bo"><i class="ti ti-clock-exclamation"></i> ส่งช้า</span>';bcol='var(--or)';}
    else{badge='<span class="badge br"><i class="ti ti-x"></i> ยังไม่ส่ง</span>';bcol='var(--rd)';}
    const typeTag=(a.type==='track')?'<span style="font-size:10px;color:var(--or);background:var(--orl);padding:1px 6px;border-radius:8px;margin-left:6px">ติดตาม</span>':'';
    const dueTag=a.dueDate?`<div style="font-size:11.5px;color:var(--mu);margin-top:2px"><i class="ti ti-calendar"></i> กำหนดส่ง: ${thDate(a.dueDate)}</div>`:'';
    html+=`<div style="padding:12px 14px;border-bottom:1px solid var(--bd);border-left:4px solid ${bcol};display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
      <div style="flex:1"><div style="font-weight:600">${a.name}${typeTag}</div>${dueTag}</div>
      <div style="flex-shrink:0">${badge}</div>
    </div>`;
  });
  html+=`</div></div>`;

  document.getElementById('mainContent').innerHTML=html;
}

/* ── PASSWORD UI HELPERS ── */
function updPwDots(inputId, dotsId){
  const inp=document.getElementById(inputId);const dots=document.getElementById(dotsId);
  if(!inp||!dots)return;
  const len=inp.value.length;const max=6;
  dots.innerHTML=Array.from({length:max},(_,i)=>`<div class="pw-dot${i<len?' filled':''}"></div>`).join('');
}
function togglePwEye(inputId, btn){
  const inp=document.getElementById(inputId);if(!inp)return;
  const show=inp.type==='password';inp.type=show?'text':'password';
  btn.innerHTML=show?'<i class="ti ti-eye-off"></i>':'<i class="ti ti-eye"></i>';
}
function updPwStrength(inputId){
  const pw=document.getElementById(inputId)?.value||'';
  const bar=document.getElementById('regPwBar');const hint=document.getElementById('regPwHint');
  if(!bar||!hint)return;
  let strength=0,msg='';
  if(pw.length>=4)strength++;if(pw.length>=8)strength++;
  if(/[A-Z]/.test(pw)||/[ก-ฮ]/.test(pw))strength++;
  if(/[0-9]/.test(pw))strength++;
  if(/[^a-zA-Z0-9ก-ฮ]/.test(pw))strength++;
  const colors=['#EF4444','#F97316','#EAB308','#22C55E','#16A34A'];
  const labels=['อ่อนมาก','อ่อน','พอใช้','แข็งแกร่ง','แข็งแกร่งมาก'];
  bar.style.width=(strength/5*100)+'%';bar.style.background=colors[strength-1]||'#E5E7EB';
  hint.textContent=pw.length?'ความแข็งแกร่ง: '+(labels[strength-1]||''):' ';
}
function checkPwMatch(){
  const pw=document.getElementById('regPw')?.value||'';
  const pw2=document.getElementById('regPw2')?.value||'';
  const msg=document.getElementById('pwMatchMsg');if(!msg)return;
  if(!pw2){msg.textContent='';return;}
  msg.innerHTML=pw===pw2?'<span style="color:var(--gn)"><i class="ti ti-check"></i> รหัสผ่านตรงกัน</span>':'<span style="color:var(--rd)"><i class="ti ti-x"></i> รหัสผ่านไม่ตรงกัน</span>';
}

  const desc=isChange?'กรอกรหัสผ่านเดิมและรหัสผ่านใหม่':'บัญชีนี้ยังไม่มีรหัสผ่าน กรุณาตั้งรหัสผ่านก่อนเข้าใช้งาน';
  const content=document.getElementById('mainContent');
  document.getElementById('navTabs').style.display='none';
  content.innerHTML=`
  <div class="login-box">
    <div class="login-logo">
      <i class="ti ti-lock-plus"></i>
      <h2>${title}</h2>
      <p>${stu?stu.firstName+' '+stu.lastName:''} ${desc}</p>
    </div>
    <div id="setPwErr"></div>
    ${isChange?`<div class="fg pw-toggle">
      <label class="fl"><i class="ti ti-lock"></i> รหัสผ่านเดิม</label>
      <input type="password" id="oldPw" placeholder="รหัสผ่านเดิม" autocomplete="current-password">
      <button class="pw-eye" onclick="togglePwEye('oldPw',this)" type="button"><i class="ti ti-eye"></i></button>
    </div>`:''}
    <div class="fg pw-toggle">
      <label class="fl"><i class="ti ti-lock"></i> รหัสผ่านใหม่ (อย่างน้อย 4 ตัว)</label>
      <input type="password" id="newPw" placeholder="••••••" autocomplete="new-password" oninput="updPwStrength('newPw');updPwDots('newPw','npd')">
      <button class="pw-eye" onclick="togglePwEye('newPw',this)" type="button"><i class="ti ti-eye"></i></button>
      <div class="pw-strength" id="regPwBar"></div>
      <div id="regPwHint" style="font-size:11px;color:var(--mu);margin-top:3px"></div>
    </div>
    <div class="pw-dots" id="npd"></div>
    <div class="fg pw-toggle">
      <label class="fl"><i class="ti ti-lock-check"></i> ยืนยันรหัสผ่านใหม่</label>
      <input type="password" id="newPw2" placeholder="กรอกอีกครั้ง" autocomplete="new-password" oninput="updPwDots('newPw2','npd2');checkPwMatchSet()" onkeydown="if(event.key==='Enter')doSetPassword('${cid}','${sid}',${isChange})">
      <button class="pw-eye" onclick="togglePwEye('newPw2',this)" type="button"><i class="ti ti-eye"></i></button>
    </div>
    <div class="pw-dots" id="npd2"></div>
    <div id="setPwMatch" style="font-size:12px;margin-bottom:10px"></div>
    <button class="btn btn-tl btn-full" onclick="doSetPassword('${cid}','${sid}',${isChange})"><i class="ti ti-check"></i> ${title}</button>
    <div style="margin-top:12px;text-align:center"><button class="btn btn-sm btn-outline" onclick="${isChange?'goHome()':'renderLogin()'}">← ยกเลิก</button></div>
  </div>`;
}
function checkPwMatchSet(){
  const pw=document.getElementById('newPw')?.value||'';
  const pw2=document.getElementById('newPw2')?.value||'';
  const msg=document.getElementById('setPwMatch');if(!msg)return;
  if(!pw2){msg.textContent='';return;}
  msg.innerHTML=pw===pw2?'<span style="color:var(--gn)"><i class="ti ti-check"></i> รหัสผ่านตรงกัน</span>':'<span style="color:var(--rd)"><i class="ti ti-x"></i> รหัสผ่านไม่ตรงกัน</span>';
}
async function doSetPassword(cid,sid,isChange){
  const errEl=document.getElementById('setPwErr');
  const newPw=(document.getElementById('newPw')?.value||'').trim();
  const newPw2=(document.getElementById('newPw2')?.value||'').trim();
  if(isChange){
    const oldPw=(document.getElementById('oldPw')?.value||'').trim();
    if(!oldPw){if(errEl)errEl.innerHTML=`<div class="err-box"><i class="ti ti-lock"></i>กรุณากรอกรหัสผ่านเดิม</div>`;return;}
    const ok=await checkPw(sid,oldPw);
    if(!ok){if(errEl)errEl.innerHTML=`<div class="err-box"><i class="ti ti-lock-x"></i>รหัสผ่านเดิมไม่ถูกต้อง</div>`;return;}
  }
  if(newPw.length<4){if(errEl)errEl.innerHTML=`<div class="err-box"><i class="ti ti-lock"></i>รหัสผ่านใหม่ต้องมีอย่างน้อย 4 ตัวอักษร</div>`;return;}
  if(newPw!==newPw2){if(errEl)errEl.innerHTML=`<div class="err-box"><i class="ti ti-lock-x"></i>รหัสผ่านทั้งสองไม่ตรงกัน</div>`;return;}
  me={classId:cid,studentId:sid};
  showToast('ตั้งรหัสผ่านสำเร็จ กำลังบันทึก...');
  // ส่งรหัสผ่านให้ merge (หานักเรียนเดิมเพื่อส่ง object ด้วย)
  const stuObj=stuArr(cid).find(s=>s.id===sid)||null;
  await saveStudentInfo(cid,sid,stuObj,newPw);
  saveSession();renderApp();
}

/* ── EDIT MY INFO ── */
function editMyInfo(){
  const stu=stuArr(me.classId).find(s=>s.id===me.studentId);
  if(!stu)return;
  const content=document.getElementById('mainContent');
  content.innerHTML=`
  <div class="login-box" style="margin-top:0">
    <div class="login-logo"><i class="ti ti-user-edit"></i><h2>แก้ไขข้อมูล</h2></div>
    <div class="fg"><label class="fl">เลขที่</label><input type="number" id="editNo" value="${stu.no}"></div>
    <div class="fg"><label class="fl">ชื่อ</label><input type="text" id="editFn" value="${stu.firstName}"></div>
    <div class="fg"><label class="fl">นามสกุล</label><input type="text" id="editLn" value="${stu.lastName}"></div>
    <button class="btn btn-tl btn-full" onclick="saveMyInfo()"><i class="ti ti-check"></i> บันทึก</button>
    <div style="margin:14px 0;border-top:1px solid var(--bd)"></div>
    <button class="btn btn-outline btn-full" onclick="renderSetPassword('${me.classId}','${me.studentId}',true)"><i class="ti ti-lock"></i> เปลี่ยนรหัสผ่าน</button>
    <div style="margin-top:10px;text-align:center"><button class="btn btn-sm btn-outline" onclick="switchTab('home')">← ยกเลิก</button></div>
  </div>`;
}
async function saveMyInfo(){
  const stu=stuArr(me.classId).find(s=>s.id===me.studentId);if(!stu)return;
  const no=parseInt(document.getElementById('editNo')?.value)||stu.no;
  const fn=(document.getElementById('editFn')?.value||'').trim()||stu.firstName;
  const ln=(document.getElementById('editLn')?.value||'').trim();
  const updatedObj={id:me.studentId,no,firstName:fn,lastName:ln};
  showToast('กำลังบันทึก...');
  // ส่ง object ที่แก้แล้วให้ merge กับ cloud
  await saveStudentInfo(me.classId,me.studentId,updatedObj,null);
  showToast('บันทึกเรียบร้อย ✓');
  switchTab('home');
}

function logout(){me=null;localStorage.removeItem('stuSession');currentTab='home';renderLogin();}

/* ── INIT ── */
init();
</script>
</body>
</html>
