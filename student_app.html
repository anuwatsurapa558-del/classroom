<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ClassRoom นักเรียน">

<title>ระบบดูคะแนนและเวลาเรียน (นักเรียน)</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#F0FDFA;--sf:#fff;--s2:#CCFBF1;--s3:#99F6E4;
  --bd:rgba(0,0,0,0.09);--bmd:rgba(0,0,0,0.15);
  --tx:#134E4A;--mu:#0F766E;--hn:#5EEAD4;
  --tl:#0D9488;--tll:#CCFBF1;--tld:#0F766E;
  --gn:#16A34A;--gnl:#DCFCE7;
  --rd:#DC2626;--rdl:#FEE2E2;
  --am:#D97706;--aml:#FEF3C7;
  --bl:#2563EB;--bll:#EFF6FF;
  --pu:#7C3AED;--pul:#EDE9FE;
  --r:10px;--rl:14px;
  --sh:0 2px 8px rgba(13,148,136,0.08),0 1px 3px rgba(0,0,0,0.06);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow-x:hidden;}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--tx);font-size:15px;line-height:1.6;}

/* HEADER */
.header{background:linear-gradient(135deg,var(--tl),var(--tld));color:#fff;padding:0;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(13,148,136,0.3);}
.header-inner{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;}
.header h1{font-size:17px;font-weight:700;}
.header p{font-size:11px;opacity:.8;margin-top:1px;}
.header-right{display:flex;align-items:center;gap:8px;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.4);}
.sync-dot.ok{background:#4ADE80;}

/* TABS */
.nav-tabs{background:rgba(0,0,0,0.15);display:flex;padding:0 8px;justify-content:center;gap:4px;}
.nav-tab{flex:1;padding:10px 6px;border:none;background:none;color:rgba(255,255,255,0.7);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;white-space:nowrap;text-align:center;display:inline-flex;align-items:center;justify-content:center;gap:5px;}
.nav-tab.active{color:#fff;border-bottom-color:#fff;font-weight:700;}

/* CONTENT */
.content{max-width:680px;margin:0 auto;padding:16px;}

/* LOGIN SCREEN */
.login-box{background:var(--sf);border-radius:16px;padding:28px 24px;box-shadow:var(--sh);max-width:420px;margin:24px auto;}
.login-logo{text-align:center;margin-bottom:20px;}
.login-logo i{font-size:48px;color:var(--tl);display:block;}
.login-logo h2{font-size:20px;font-weight:700;color:var(--tx);margin-top:8px;}
.login-logo p{font-size:13px;color:var(--mu);margin-top:4px;}

/* CARDS */
.card{background:var(--sf);border-radius:var(--rl);box-shadow:var(--sh);margin-bottom:14px;overflow:hidden;}
.card-hd{padding:14px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;}
.card-hd-title{font-size:14px;font-weight:700;color:var(--tx);}
.card-bd{padding:14px 16px;}

/* PROFILE CARD */
.profile-card{background:linear-gradient(135deg,var(--tl),var(--tld));color:#fff;border-radius:var(--rl);padding:20px;margin-bottom:14px;box-shadow:var(--sh);}
.profile-name{font-size:20px;font-weight:700;margin-top:8px;}
.profile-info{font-size:13px;opacity:.85;margin-top:2px;}

/* STATS GRID */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px;margin-bottom:14px;}
.sc{background:var(--sf);border-radius:var(--r);padding:12px;box-shadow:var(--sh);text-align:center;}
.sl{font-size:10px;color:var(--mu);font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.sv{font-size:22px;font-weight:800;line-height:1.2;margin-top:2px;}

/* BADGE */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;}
.bg{background:var(--gnl);color:var(--gn);}
.br{background:var(--rdl);color:var(--rd);}
.ba{background:var(--aml);color:var(--am);}
.bb{background:var(--bll);color:var(--bl);}
.bt{background:var(--tll);color:var(--tl);}
.bx{background:#F1F5F9;color:#64748B;}
.bp{background:var(--pul);color:var(--pu);}

/* TABLE */
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--mu);padding:8px 10px;border-bottom:1px solid var(--bd);background:var(--s2);white-space:nowrap;}
td{padding:8px 10px;border-bottom:1px solid var(--bd);vertical-align:middle;}
tr:last-child td{border-bottom:none;}

/* FORM */
.fg{margin-bottom:12px;}
.fl{display:block;font-size:13px;font-weight:600;margin-bottom:4px;color:var(--tx);}
input[type=text],input[type=number],select{width:100%;padding:10px 12px;border:1.5px solid var(--bmd);border-radius:8px;font-family:inherit;font-size:16px;color:var(--tx);background:var(--sf);outline:none;transition:border-color .12s;}
input:focus,select:focus{border-color:var(--tl);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:10px 18px;border-radius:8px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .12s;touch-action:manipulation;}
.btn-tl{background:var(--tl);color:#fff;}
.btn-tl:active{opacity:.8;}
.btn-sm{padding:6px 12px;font-size:13px;}
.btn-outline{background:none;border:1.5px solid var(--tl);color:var(--tl);}
.btn-full{width:100%;justify-content:center;}

/* GRADE */
.grade{display:inline-block;padding:4px 12px;border-radius:20px;font-size:15px;font-weight:800;}
.g4{background:#14532D;color:#fff;}
.g35{background:var(--gnl);color:#14532D;}
.g3{background:var(--gnl);color:var(--gn);}
.g25{background:var(--bll);color:var(--bl);}
.g2{background:var(--bll);color:var(--bl);}
.g15{background:var(--aml);color:var(--am);}
.g1{background:var(--aml);color:var(--am);}
.g0{background:var(--rdl);color:var(--rd);}

/* PROGRESS */
.prog{height:8px;background:var(--s2);border-radius:4px;overflow:hidden;margin-top:6px;}
.pf{height:100%;border-radius:4px;transition:width .5s;}

/* ATT ROW */
.att-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--bd);}
.att-row:last-child{border-bottom:none;}
.att-date{flex:1;font-size:13.5px;}
.att-status{font-weight:700;}

/* EMPTY */
.empty{padding:32px;text-align:center;color:var(--mu);}
.empty i{font-size:32px;margin-bottom:8px;display:block;}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:#134E4A;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;z-index:500;opacity:0;transition:all .22s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* PASSWORD */
input[type=password]{width:100%;padding:10px 12px;border:1.5px solid var(--bmd);border-radius:8px;font-family:inherit;font-size:20px;color:var(--tx);background:var(--sf);outline:none;transition:border-color .12s;letter-spacing:4px;text-align:center;}
input[type=password]:focus{border-color:var(--tl);}
.pw-dots{display:flex;justify-content:center;gap:10px;margin:10px 0;}
.pw-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--tl);background:transparent;transition:background .15s;}
.pw-dot.filled{background:var(--tl);}
.err-box{background:var(--rdl);border:1px solid rgba(220,38,38,.2);border-radius:8px;padding:10px 14px;font-size:12.5px;color:var(--rd);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.ok-box{background:var(--gnl);border:1px solid rgba(22,163,74,.2);border-radius:8px;padding:10px 14px;font-size:12.5px;color:var(--gn);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.pw-strength{height:4px;border-radius:2px;margin-top:4px;transition:all .3s;}
.pw-toggle{position:relative;}
.pw-toggle input{padding-right:44px;}
.pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--mu);font-size:18px;background:none;border:none;}

/* STUDENT PICKER LIST */
.stu-picker{max-height:280px;overflow-y:auto;-webkit-overflow-scrolling:touch;border:1.5px solid var(--bmd);border-radius:10px;margin-top:6px;}
.stu-pick-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .12s;}
.stu-pick-item:last-child{border-bottom:none;}
.stu-pick-item:active,.stu-pick-item.sel{background:var(--tll);}
.stu-pick-item.sel{border-left:4px solid var(--tl);}
.stu-pick-no{width:32px;height:32px;border-radius:50%;background:var(--s2);color:var(--tld);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.stu-pick-name{flex:1;font-size:14px;}
.stu-pick-check{color:var(--tl);font-size:20px;}
.stu-search{margin-top:8px;}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--mu);gap:10px;font-size:14px;}
.spinner{width:20px;height:20px;border:2px solid var(--s3);border-top-color:var(--tl);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:300;display:none;align-items:center;justify-content:center;padding:16px;}
.mo.open{display:flex;}
.md{background:var(--sf);border-radius:16px;padding:22px;width:100%;max-width:520px;box-shadow:0 10px 40px rgba(0,0,0,0.2);max-height:88vh;overflow-y:auto;animation:fadeIn .22s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px) scale(0.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.mt{font-size:16px;font-weight:700;margin-bottom:16px;text-align:center;}

/* SEGMENT TABS (score-type-bar) — สำหรับ tab เล็กในหน้า */
.score-type-bar{display:flex;gap:0;margin-bottom:14px;border:1.5px solid var(--bd);border-radius:10px;overflow:hidden;}
.score-type-btn{flex:1;padding:10px 6px;border:none;background:var(--sf2);font-family:inherit;font-size:13px;font-weight:500;color:var(--mu);cursor:pointer;transition:all .12s;display:inline-flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap;}
.score-type-btn:not(:last-child){border-right:1px solid var(--bd);}
.score-type-btn.active{background:var(--tl);color:#fff;font-weight:700;}
.score-type-btn i{font-size:14px;}

/* SUBJECT TABS */
.sub-tabs{display:flex;gap:4px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;}
.sub-tabs::-webkit-scrollbar{display:none;}
.sub-tab{padding:6px 14px;border-radius:20px;border:1.5px solid var(--bd);background:none;font-family:inherit;font-size:12.5px;font-weight:500;color:var(--mu);cursor:pointer;white-space:nowrap;transition:all .12s;}
.sub-tab.active{background:var(--tl);color:#fff;border-color:var(--tl);}

@media(max-width:480px){
  .content{padding:12px;}
  .login-box{margin:12px;padding:22px 18px;}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-inner">
    <div style="display:flex;align-items:center;gap:10px;min-width:0">
      <span id="hdrLogo"><span style="font-size:22px">📚</span></span>
      <div style="min-width:0">
        <h1 id="hdrName" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">ClassRoom</h1>
        <p id="headerSub">ระบบสำหรับนักเรียน</p>
      </div>
    </div>
    <div class="header-right">
      <div class="sync-dot" id="syncDot" title="สถานะการเชื่อมต่อ"></div>
    </div>
  </div>
  <div class="nav-tabs" id="navTabs" style="display:none">
    <button class="nav-tab active" onclick="switchTab('home',this)"><i class="ti ti-home"></i> หน้าหลัก</button>
    <button class="nav-tab" onclick="switchTab('attendance',this)"><i class="ti ti-calendar-check"></i> เวลาเรียน</button>
    <button class="nav-tab" onclick="switchTab('assignments',this)"><i class="ti ti-clipboard-list"></i> งาน</button>
    <button class="nav-tab" id="tab-grades" onclick="switchTab('grades',this)" style="display:none"><i class="ti ti-award"></i> ผลการเรียน</button>
    <button class="nav-tab" id="tab-fiveS" onclick="switchTab('fiveS',this)" style="display:none"><i class="ti ti-sparkles"></i> 5 ส</button>
  </div>
</div>

<div class="content" id="mainContent">
  <div class="loading"><div class="spinner"></div> กำลังโหลดข้อมูล...</div>
</div>

<div class="toast" id="toast"></div>

<div class="mo" id="MO" onclick="if(event.target.id==='MO')closeMD()">
  <div class="md" id="MC"></div>
</div>

<script>
// ═══ Supabase Connection ═══
const SUPABASE_URL='https://ymmjsalckzznmungcsip.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InltbWpzYWxja3p6bm11bmdjc2lwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3NTkyMDUsImV4cCI6MjA5OTMzNTIwNX0.CmiyDZJ3oM_DLeKE-DS-qVVN7eqUQCe0EdnGoZFhVGk';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const SCHOOL_ID='main';

let db={classes:[],students:{},subjects:{},attendance:{},assignments:{},scores:{},examScores:{}};
let me=null; // {classId, studentId}
let currentTab='home';
let currentSubject=null;

/* ── HELPERS ── */
function todayStr(){return new Date().toISOString().split('T')[0];}
function thDate(d){
  const mo=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const[y,m,day]=d.split('-');return`${+day} ${mo[+m-1]} ${+y+543}`;
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function showMD(html){document.getElementById('MC').innerHTML=html;document.getElementById('MO').classList.add('open');}
function closeMD(){document.getElementById('MO').classList.remove('open');}
function setSync(state){const d=document.getElementById('syncDot');if(d){d.className='sync-dot'+(state==='ok'?' ok':state==='sync'?' sync':'');if(state==='sync')setTimeout(()=>{d.className='sync-dot ok';},1500);}}

/* ── GRADE ── */
function calcGrade(pct){
  if(pct>=80)return{g:'4',cls:'g4'};if(pct>=75)return{g:'3.5',cls:'g35'};
  if(pct>=70)return{g:'3',cls:'g3'};if(pct>=65)return{g:'2.5',cls:'g25'};
  if(pct>=60)return{g:'2',cls:'g2'};if(pct>=55)return{g:'1.5',cls:'g15'};
  if(pct>=50)return{g:'1',cls:'g1'};return{g:'0',cls:'g0'};
}
function calcTotal(cid,subid,stuId){
  const sub=subArr(cid).find(s=>s.id===subid);
  if(!sub)return{assignScore:0,examScore:0,totalScore:0,wA:70,wE:30,grade:{g:'0',cls:'g0'},finalGrade:'0',finalCls:'g0',note:'',missing:0};
  const wA=sub.wAssign??70,wE=sub.wExam??30;
  // ── คะแนนเก็บ ──
  const asgs=(asgBlock(cid)[subid])||[];
  const scoreAsgs=asgs.filter(a=>a.type!=='track');
  const trackAsgs=asgs.filter(a=>a.type==='track');
  let assignRaw=0,assignMax=0,missingScore=0;
  scoreAsgs.forEach(a=>{
    const v=((scBlock(cid)[subid]||{})[a.id]||{})[stuId];
    if(v!==undefined&&v!==''&&!isNaN(parseFloat(v))){
      assignRaw+=parseFloat(v);
      assignMax+=a.maxScore;
    } else {
      missingScore++;
    }
  });
  // ── งานติดตาม: นับที่ยังไม่ส่ง ──
  let missingTrack=0;
  trackAsgs.forEach(a=>{
    const v=((scBlock(cid)[subid]||{})[a.id]||{})[stuId];
    if(!v||(v!=='ตรงเวลา'&&v!=='ส่งช้า')){
      missingTrack++;
    }
  });
  const missing=missingScore+missingTrack;
  const assignScore=assignMax?assignRaw/assignMax*wA:0;
  // ── คะแนนสอบ ──
  const ex=((exBlock(cid)[subid])||{})[stuId]||{};
  const midMax=sub.midMax||0,finMax=sub.finalMax||0;
  const midRaw=ex.mid!==undefined&&ex.mid!==''&&!isNaN(parseFloat(ex.mid))?parseFloat(ex.mid):null;
  const finRaw=ex.final!==undefined&&ex.final!==''&&!isNaN(parseFloat(ex.final))?parseFloat(ex.final):null;
  let examRaw=0, examMax=0;
  if(midRaw!==null){examRaw+=midRaw; examMax+=midMax;}
  if(finRaw!==null){examRaw+=finRaw; examMax+=finMax;}
  const examScore=examMax?examRaw/examMax*wE:0;
  // ── คะแนนรวม ──
  const totalScore=assignScore+examScore;
  const gradeObj=calcGrade(totalScore);
  // ── เกรดสุดท้าย + หมายเหตุ ──
  let finalGrade=gradeObj.g;
  let finalCls=gradeObj.cls;
  let note='';
  const hasAnyAsg=scoreAsgs.length>0||trackAsgs.length>0;
  if(totalScore<50){
    finalGrade='0'; finalCls='g0'; note='คะแนนไม่ถึงเกณฑ์';
  } else if(hasAnyAsg && missing>0){
    finalGrade='ร'; finalCls='g0'; note='ส่งงานไม่ครบ';
  }
  return{
    assignScore:Math.round(assignScore*10)/10,
    examScore:Math.round(examScore*10)/10,
    totalScore:Math.round(totalScore*10)/10,
    wA, wE, grade:gradeObj, finalGrade, finalCls, note, missing
  };
}

/* ── LOAD DATA ── */
const DAYS_TH=['จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์','อาทิตย์'];
const DAY_COLORS=['#FEF3C7','#FCE7F3','#DBEAFE','#FED7AA','#DCFCE7','#E9D5FF','#FEE2E2'];
function ttGet(cid){
  const cls2=db.classes.find(c=>c.id===cid);
  const tkey=(cls2&&cls2.termId)?cls2.termId+'__'+cid:cid;
  return (db.timetable&&db.timetable[tkey])||[];
}

function updateHeaderSchool(){
  const sch=db.school||{};
  const nameEl=document.getElementById('hdrName');
  const logoEl=document.getElementById('hdrLogo');
  if(nameEl)nameEl.textContent=sch.name||'ClassRoom';
  if(logoEl)logoEl.innerHTML=sch.logo
    ?`<img src="${sch.logo}" style="width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.4)">`
    :'<span style="font-size:22px">📚</span>';
}
function _normalizeDB(){
  if(!db.examScores)db.examScores={};
  if(!db.studentPasswords)db.studentPasswords={};
  if(!db.school)db.school={};
  if(!db.terms)db.terms=[];
  if(!db.fiveS)db.fiveS={items:['สะสาง','สะดวก','สะอาด','สร้างมาตรฐาน','สร้างวินัย'],groups:{},checks:{}};
  if(!db.fiveS.items||!db.fiveS.items.length)db.fiveS.items=['สะสาง','สะดวก','สะอาด','สร้างมาตรฐาน','สร้างวินัย'];
  if(!db.fiveS.groups)db.fiveS.groups={};
  if(!db.fiveS.checks)db.fiveS.checks={};
  // ตั้ง currentTermId จาก term ที่ isCurrent
  const cur=db.terms.find(t=>t.isCurrent);
  window._currentTermId=cur?cur.id:(db.terms[0]?.id||null);
  updateHeaderSchool();
}

async function _rowsToDbStu(rows){
  const d={
    school:{name:'',subdistrict:'',district:'',province:'',logo:''},
    terms:[],classes:[],students:{},subjects:{},attendance:{},
    assignments:{},scores:{},examScores:{},studentPasswords:{},
    submitStatus:{},timetable:{},periods:[],
    fiveS:{items:['สะสาง','สะดวก','สะอาด','สร้างมาตรฐาน','สร้างวินัย'],groups:{},checks:{}}
  };
  if(rows.school&&rows.school[0]){
    const s=rows.school[0];
    d.school={name:s.name||'',subdistrict:s.subdistrict||'',district:s.district||'',province:s.province||'',logo:s.logo||''};
  }
  d.terms=(rows.terms||[]).map(t=>({id:t.id,year:t.year,semester:t.semester,label:t.label,isCurrent:!!t.is_current}));
  d.classes=(rows.classes||[]).map(c=>({id:c.id,name:c.name,termId:c.term_id,showGrades:!!c.show_grades}));
  d.periods=(rows.periods||[]).sort((a,b)=>a.order_num-b.order_num).map(p=>{
    const o={name:p.name,start:p.start_time,end:p.end_time};
    if(p.is_fixed){o.isFixed=true;o.label=p.label||'';o.color=p.color||'';}
    return o;
  });
  const cid2term={};
  d.classes.forEach(c=>{cid2term[c.id]=c.termId||'';});
  (rows.students||[]).forEach(s=>{
    const tkey=(cid2term[s.class_id]||'')+'__'+s.class_id;
    if(!d.students[tkey])d.students[tkey]=[];
    d.students[tkey].push({id:s.id,no:s.no,firstName:s.first_name,lastName:s.last_name});
    if(s.password)d.studentPasswords[s.id]=s.password;
  });
  (rows.subjects||[]).forEach(s=>{
    const tkey=(cid2term[s.class_id]||'')+'__'+s.class_id;
    if(!d.subjects[tkey])d.subjects[tkey]=[];
    d.subjects[tkey].push({
      id:s.id,name:s.name,code:s.code||'',teacher:s.teacher||'',
      wAssign:s.w_assign,wExam:s.w_exam,midMax:s.mid_max,finalMax:s.final_max
    });
  });
  const sid2cid={};
  (rows.subjects||[]).forEach(s=>{sid2cid[s.id]=s.class_id;});
  const asgId2sub={};
  (rows.assignments||[]).forEach(a=>{
    const tkey=(cid2term[a.class_id]||'')+'__'+a.class_id;
    if(!d.assignments[tkey])d.assignments[tkey]={};
    if(!d.assignments[tkey][a.subject_id])d.assignments[tkey][a.subject_id]=[];
    d.assignments[tkey][a.subject_id].push({
      id:a.id,name:a.name,maxScore:a.max_score,type:a.type||'score',dueDate:a.due_date||'',
      allowFileSubmit:!!a.allow_file_submit
    });
    asgId2sub[a.id]={cid:a.class_id,subId:a.subject_id};
  });
  (rows.attendance||[]).forEach(a=>{
    const tkey=(cid2term[a.class_id]||'')+'__'+a.class_id;
    if(!d.attendance[tkey])d.attendance[tkey]={};
    if(!d.attendance[tkey][a.subject_id])d.attendance[tkey][a.subject_id]={};
    if(!d.attendance[tkey][a.subject_id][a.date])d.attendance[tkey][a.subject_id][a.date]={};
    d.attendance[tkey][a.subject_id][a.date][a.student_id]=a.status;
  });
  (rows.scores||[]).forEach(sc=>{
    const info=asgId2sub[sc.assignment_id];
    if(!info)return;
    const tkey=(cid2term[info.cid]||'')+'__'+info.cid;
    if(!d.scores[tkey])d.scores[tkey]={};
    if(!d.scores[tkey][info.subId])d.scores[tkey][info.subId]={};
    if(!d.scores[tkey][info.subId][sc.assignment_id])d.scores[tkey][info.subId][sc.assignment_id]={};
    const v=sc.value;const n=parseFloat(v);
    d.scores[tkey][info.subId][sc.assignment_id][sc.student_id]=(!isNaN(n)&&String(n)===v)?n:v;
  });
  (rows.exam_scores||[]).forEach(e=>{
    const cid=sid2cid[e.subject_id];
    if(!cid)return;
    const tkey=(cid2term[cid]||'')+'__'+cid;
    if(!d.examScores[tkey])d.examScores[tkey]={};
    if(!d.examScores[tkey][e.subject_id])d.examScores[tkey][e.subject_id]={};
    const rec={};
    if(e.mid_score!==null)rec.mid=parseFloat(e.mid_score);
    if(e.final_score!==null)rec.final=parseFloat(e.final_score);
    if(Object.keys(rec).length)d.examScores[tkey][e.subject_id][e.student_id]=rec;
  });
  (rows.timetable||[]).forEach(t=>{
    const tkey=(cid2term[t.class_id]||'')+'__'+t.class_id;
    if(!d.timetable[tkey])d.timetable[tkey]=[];
    const o={id:t.id,day:t.day,start:t.start_time,end:t.end_time,note:t.note||''};
    if(t.subject_id)o.subId=t.subject_id;
    if(t.is_activity){o.isActivity=true;o.activityName=t.activity_name||'';}
    d.timetable[tkey].push(o);
  });
  const groupMembers={};
  (rows.five_s_members||[]).forEach(m=>{
    if(!groupMembers[m.group_id])groupMembers[m.group_id]=[];
    groupMembers[m.group_id].push(m.student_id);
  });
  (rows.five_s_groups||[]).forEach(g=>{
    const tkey=(cid2term[g.class_id]||'')+'__'+g.class_id;
    if(!d.fiveS.groups[tkey])d.fiveS.groups[tkey]=[];
    d.fiveS.groups[tkey].push({
      id:g.id,name:g.name,leaderId:g.leader_id||null,
      memberIds:groupMembers[g.id]||[],items:g.items
    });
  });
  const groupToClass={};
  (rows.five_s_groups||[]).forEach(g=>{groupToClass[g.id]=g.class_id;});
  (rows.five_s_checks||[]).forEach(ck=>{
    const cid=groupToClass[ck.group_id];
    if(!cid)return;
    const ckey=(cid2term[cid]||'')+'__'+cid+'__'+ck.group_id;
    if(!d.fiveS.checks[ckey])d.fiveS.checks[ckey]={};
    if(!d.fiveS.checks[ckey][ck.date])d.fiveS.checks[ckey][ck.date]={};
    d.fiveS.checks[ckey][ck.date][ck.student_id]={items:ck.items||{},note:ck.note||''};
  });
  return d;
}

async function loadData(){
  try{
    const tables=['school','terms','classes','students','subjects','attendance','assignments','scores','exam_scores','timetable','periods','five_s_groups','five_s_members','five_s_checks'];
    const results=await Promise.all(tables.map(t=>sb.from(t).select('*')));
    const rows={};
    tables.forEach((t,i)=>{rows[t]=results[i].data||[];});
    db=await _rowsToDbStu(rows);
    _normalizeDB();
    setSync('ok');
    return true;
  }catch(e){setSync('');console.error('load error:',e);}
  try{
    const x=localStorage.getItem('crDB4');
    if(x){db=JSON.parse(x);_normalizeDB();return true;}
  }catch(e){}
  return false;
}

/* ── TERM KEY HELPER ──
   ข้อมูลในระบบครูเก็บด้วย key = "termId__classId"
   ฟังก์ชัน tk(cid) คืนค่า key ที่ถูกต้องโดยหา termId จาก db.classes
── */
function tk(cid){
  const cls2=db.classes.find(c=>c.id===cid);
  if(cls2&&cls2.termId) return cls2.termId+'__'+cid;
  // fallback: ลอง currentTermId จากระบบครู
  if(window._currentTermId) return window._currentTermId+'__'+cid;
  return cid;
}
// ย่อการเข้าถึงข้อมูล
function stuArr(cid){return db.students[tk(cid)]||db.students[cid]||[];}
function subArr(cid){return db.subjects[tk(cid)]||db.subjects[cid]||[];}
function attBlock(cid){return db.attendance[tk(cid)]||db.attendance[cid]||{};}
function asgBlock(cid){return db.assignments[tk(cid)]||db.assignments[cid]||{};}
function scBlock(cid){return db.scores[tk(cid)]||db.scores[cid]||{};}
function exBlock(cid){return db.examScores[tk(cid)]||db.examScores[cid]||{};}

/* ── SAVE STUDENT SELF-REGISTRATION ── */
async function saveStudentInfo(cid,stuId,studentObj,pwPlain){
  // อัปเดต local db ทันที
  const cls2=db.classes.find(x=>x.id===cid);
  const tkey=(cls2&&cls2.termId)?cls2.termId+'__'+cid:(window._currentTermId?window._currentTermId+'__'+cid:cid);
  if(studentObj){
    if(!db.students[tkey])db.students[tkey]=[];
    const existing=db.students[tkey].findIndex(s=>s.id===stuId);
    if(existing>=0) db.students[tkey][existing]=studentObj;
    else db.students[tkey].push(studentObj);
  }
  if(pwPlain!==undefined&&pwPlain!==null){
    if(!db.studentPasswords)db.studentPasswords={};
    db.studentPasswords[stuId]=pwPlain;
  }
  // บันทึกเฉพาะ row ของนักเรียนคนนี้ (ไม่กระทบคนอื่น)
  try{
    if(studentObj){
      const row={
        id:stuId, class_id:cid, no:studentObj.no,
        first_name:studentObj.firstName, last_name:studentObj.lastName,
        password:pwPlain||''
      };
      const {error}=await sb.from('students').upsert(row,{onConflict:'id'});
      if(error)throw error;
    } else if(pwPlain!==undefined){
      const {error}=await sb.from('students').update({password:pwPlain}).eq('id',stuId);
      if(error)throw error;
    }
    _lastSaveTimeStu=Date.now();
    setSync('ok');
  }catch(e){setSync('');console.error('save error:',e);}
  localStorage.setItem('crDB4',JSON.stringify(db));
}

/* รหัสผ่านเก็บแบบ plaintext ใน db.studentPasswords = { studentId: password } */
function getPw(sid){return(db.studentPasswords||{})[sid]||'';}
async function setPwHash(sid,pw){
  // ยังคงใช้ชื่อ setPwHash เพื่อความเข้ากันได้ แต่เก็บ plaintext
  if(!db.studentPasswords)db.studentPasswords={};
  db.studentPasswords[sid]=pw;
}
async function checkPw(sid,pw){
  const stored=getPw(sid);
  if(!stored)return true; // ยังไม่มีรหัส = ผ่าน (ต้องตั้งรหัสก่อน)
  return stored===pw;
}
function hasPw(sid){return !!(db.studentPasswords||{})[sid];}

/* ── REALTIME SUBSCRIPTION ── */
let _lastSaveTimeStu=0;
function _setupRealtimeStu(){
  const tables=['school','terms','classes','students','subjects','attendance','assignments','scores','exam_scores','timetable','five_s_groups','five_s_members','five_s_checks'];
  const channel=sb.channel('all-tables-stu');
  tables.forEach(t=>{
    channel.on('postgres_changes',{event:'*',schema:'public',table:t},payload=>{
      if(Date.now()-_lastSaveTimeStu<2000)return;
      clearTimeout(window._rtReloadStu);
      window._rtReloadStu=setTimeout(async()=>{
        await loadData();
        if(me){renderApp();}
        setSync('sync');
      },500);
    });
  });
  channel.subscribe(status=>{console.log('Realtime status:',status);});
  return channel;
}

/* ── INIT ── */
async function init(){
  const ok=await loadData();
  _setupRealtimeStu();
  const sess=loadSession();
  if(sess&&stuArr(sess.classId).length>0){
    const stu=stuArr(sess.classId).find(s=>s.id===sess.studentId);
    if(stu){me=sess;renderApp();return;}
  }
  renderLogin();
}

function renderStuPickList(cid,filter){
  const picker=document.getElementById('stuPicker');if(!picker)return;
  const stus=stuArr(cid).slice().sort((a,b)=>a.no-b.no);
  const f=(filter||'').toLowerCase().trim();
  const filtered=f?stus.filter(s=>(`${s.no} ${s.firstName} ${s.lastName}`).toLowerCase().includes(f)):stus;
  if(!filtered.length){
    picker.innerHTML=`<div style="padding:20px;text-align:center;color:var(--mu);font-size:13px">${stus.length?'ไม่พบชื่อที่ค้นหา':'ยังไม่มีนักเรียนในห้องนี้ กดลงทะเบียนด้านล่าง'}</div>`;
    return;
  }
  picker.innerHTML=filtered.map(s=>`
    <div class="stu-pick-item${s.id===_loginStuId?' sel':''}" onclick="pickLoginStu('${s.id}')">
      <div class="stu-pick-no">${s.no}</div>
      <div class="stu-pick-name">${s.firstName} ${s.lastName}</div>
      ${s.id===_loginStuId?'<i class="ti ti-circle-check stu-pick-check"></i>':''}

  me={classId:cid,studentId:id};
  showToast('ลงทะเบียนสำเร็จ กำลังบันทึก...');
  // ส่ง studentObj + รหัสผ่าน ให้ saveStudentInfo merge กับข้อมูลล่าสุดบน cloud
  await saveStudentInfo(cid,id,studentObj,pw);
  saveSession();renderApp();
}

/* ── APP ── */
function renderApp(){
  const stu=stuArr(me.classId).find(s=>s.id===me.studentId);
  const cls=db.classes.find(c=>c.id===me.classId);
  if(!stu||!cls){me=null;localStorage.removeItem('stuSession');renderLogin();return;}

  document.getElementById('navTabs').style.display='flex';
  document.getElementById('headerSub').textContent=`${stu.firstName} ${stu.lastName} • ${cls.name}`;
  updateHeaderSchool();
  // โชว์/ซ่อนแท็บ ผลการเรียน ตามการตั้งค่าของครู
  const gTab=document.getElementById('tab-grades');
  if(gTab)gTab.style.display=cls.showGrades?'inline-flex':'none';
  // ถ้ากำลังดูแท็บ grades แต่ครูปิดไว้ → ย้อนไปหน้าหลัก
  if(currentTab==='grades'&&!cls.showGrades)currentTab='home';
  // โชว์แท็บ 5 ส เฉพาะเมื่อเป็นหัวหน้ากลุ่ม
  const fsTab=document.getElementById('tab-fiveS');
  const isLeader=fsIsLeader(me.classId,me.studentId);
  if(fsTab)fsTab.style.display=isLeader?'inline-flex':'none';
  if(currentTab==='fiveS'&&!isLeader)currentTab='home';
  renderTab(currentTab);
}

function goHome(){switchTab("home");}
function switchTab(tab,btn){
  currentTab=tab;
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  renderTab(tab);
}

function renderTab(tab){
  if(tab==='home')renderHome();
  else if(tab==='attendance')renderAttendance();
  else if(tab==='assignments'){
    renderAssignments();
    // โหลด submissions ใน background
    loadMySubmissions().then(()=>{if(currentTab==='assignments')renderAssignments();});
  }
  else if(tab==='grades')renderGrades();
  else if(tab==='fiveS')renderFiveSStu();
}

// ── 5 ส helpers (นักเรียน) ──
function fsGroupKeyStu(cid){
  const cls=db.classes.find(c=>c.id===cid);
  const tid=cls?.termId||(db.terms&&db.terms.find(t=>t.isCurrent)?.id)||'';
  return tid+'__'+cid;
}
function fsGroupsStu(cid){return (db.fiveS&&db.fiveS.groups&&db.fiveS.groups[fsGroupKeyStu(cid)])||[];}
function fsIsLeader(cid,sid){
  return fsGroupsStu(cid).some(g=>g.leaderId===sid);
}
function fsMyGroup(cid,sid){
  return fsGroupsStu(cid).find(g=>g.leaderId===sid);
}
function fsChecksStu(cid,gid,date){
  const key=fsGroupKeyStu(cid)+'__'+gid;
  return ((db.fiveS&&db.fiveS.checks&&db.fiveS.checks[key])||{})[date]||{};
}

/* ── HOME ── */
function renderHome(){
  const stu=stuArr(me.classId).find(s=>s.id===me.studentId);
  const cls=db.classes.find(c=>c.id===me.classId);
  const subs=subArr(me.classId);
  const cid=me.classId,sid=me.studentId;

  // attendance overall
  let allMa=0,allTot=0;
  subs.forEach(sub=>{
    const dates=Object.keys((attBlock(cid)[sub.id])||{});
    dates.forEach(d=>{const st=((attBlock(cid)[sub.id]||{})[d]||{})[sid];if(st==='มา'||st==='สาย')allMa++;if(st)allTot++;});
  });
  const attRate=allTot?Math.round(allMa/allTot*100):0;

  let html=`
  <div class="profile-card">
    <div><i class="ti ti-user-circle" style="font-size:32px;opacity:.8"></i></div>
    <div class="profile-name">${stu.firstName} ${stu.lastName}</div>
    <div class="profile-info">เลขที่ ${stu.no} • ห้อง ${cls.name}</div>
    <div style="margin-top:12px"><button class="btn btn-sm" style="background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.3)" onclick="editMyInfo()"><i class="ti ti-edit"></i> แก้ไขข้อมูล</button> <button class="btn btn-sm" style="background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3)" onclick="logout()"><i class="ti ti-logout"></i> ออกจากระบบ</button></div>
  </div>
  <div class="sg">
    <div class="sc"><div class="sl">วิชา</div><div class="sv" style="color:var(--tl)">${subs.length}</div></div>
    <div class="sc"><div class="sl">มาเรียน%</div><div class="sv" style="color:${attRate>=80?'var(--gn)':attRate>=60?'var(--am)':'var(--rd)'}">${attRate}%</div></div>
    <div class="sc"><div class="sl">ครั้งมา</div><div class="sv" style="color:var(--gn)">${allMa}</div></div>
    <div class="sc"><div class="sl">ครั้งเรียน</div><div class="sv" style="color:var(--mu)">${allTot}</div></div>
  </div>`;

  // ── ตารางเรียนวันนี้ ──
  const tt=ttGet(cid);
  if(tt.length){
    const now=new Date();
    const jsDay=now.getDay();
    const day=jsDay===0?6:jsDay-1;
    const todayItems=tt.filter(t=>t.day===day).sort((a,b)=>a.start.localeCompare(b.start));
    if(todayItems.length){
      const curTime=(now.getHours()+'').padStart(2,'0')+':'+(now.getMinutes()+'').padStart(2,'0');
      html+=`<div class="card" style="margin-bottom:14px"><div class="card-hd"><div class="card-hd-title"><i class="ti ti-calendar-time"></i> วันนี้ (${DAYS_TH[day]}) — ${todayItems.length} คาบ</div></div><div class="card-bd" style="padding:0">`;
      todayItems.forEach(item=>{
        const name=item.isActivity?item.activityName:(subs.find(s=>s.id===item.subId)?.name||'—');
        const isNow=(curTime>=item.start&&curTime<item.end);
        const isPast=(curTime>=item.end);
        const bg=isNow?'var(--gnl)':isPast?'var(--sf2)':item.isActivity?'#FEF3C7':'#fff';
        const bcol=isNow?'var(--gn)':isPast?'var(--mu)':item.isActivity?'#F59E0B':'var(--tl)';
        const tag=isNow?'<span class="badge bg" style="margin-left:6px">กำลังเรียน</span>':isPast?'<span class="badge bx" style="margin-left:6px">จบแล้ว</span>':'';
        html+=`<div style="padding:10px 14px;border-bottom:1px solid var(--bd);background:${bg};border-left:3px solid ${bcol};display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-weight:700;color:${isPast?'var(--mu)':'var(--tx)'}">${item.isActivity?'★ ':''}${name}${tag}</div>
            ${item.note?`<div style="font-size:11px;color:var(--mu)">${item.note}</div>`:''}
          </div>
          <div style="font-size:12px;color:var(--mu);text-align:right">${item.start.slice(0,5)}<br>${item.end.slice(0,5)}</div>
        </div>`;
      });
      html+=`</div></div>`;
    }
  }

  // ── งานใกล้กำหนดส่ง ──
  const today=new Date();today.setHours(0,0,0,0);
  const upcoming=[];
  subs.forEach(sub=>{
    const asgs=(asgBlock(cid)[sub.id])||[];
    asgs.forEach(a=>{
      if(!a.dueDate)return;
      // เช็คว่ายังไม่ส่ง
      const v=((scBlock(cid)[sub.id]||{})[a.id]||{})[sid];
      const sent=(a.type==='track')?(v==='ตรงเวลา'||v==='ส่งช้า'):(v!==undefined&&v!==''&&!isNaN(parseFloat(v)));
      if(sent)return;
      const due=new Date(a.dueDate);due.setHours(0,0,0,0);
      const days=Math.round((due-today)/(1000*60*60*24));
      if(days>=-3&&days<=7)upcoming.push({sub,asg:a,days});
    });
  });
  upcoming.sort((a,b)=>a.days-b.days);
  if(upcoming.length){
    // แยก overdue กับ upcoming
    const overdue=upcoming.filter(u=>u.days<0);
    const today0=upcoming.filter(u=>u.days===0);
    const soon=upcoming.filter(u=>u.days>0);
    let alertHtml='';
    if(overdue.length){
      alertHtml+=`<div class="card" style="border:2px solid var(--rd);margin-bottom:14px"><div class="card-hd" style="background:var(--rdl);border-bottom:1px solid var(--rd)"><div class="card-hd-title" style="color:var(--rd)"><i class="ti ti-alert-triangle"></i> เลยกำหนดส่งแล้ว! (${overdue.length} งาน)</div></div><div class="card-bd" style="padding:0">`;
      overdue.forEach(u=>{
        alertHtml+=`<div style="padding:10px 14px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center"><div><b>${u.asg.name}</b><div style="font-size:11.5px;color:var(--mu)">${u.sub.name} • ${thDate(u.asg.dueDate)}</div></div><span class="badge br">เลย ${-u.days} วัน</span></div>`;
      });
      alertHtml+=`</div></div>`;
    }
    if(today0.length){
      alertHtml+=`<div class="card" style="border:2px solid var(--am);margin-bottom:14px"><div class="card-hd" style="background:var(--aml);border-bottom:1px solid var(--am)"><div class="card-hd-title" style="color:var(--am)"><i class="ti ti-clock-hour-4"></i> ครบกำหนดวันนี้! (${today0.length} งาน)</div></div><div class="card-bd" style="padding:0">`;
      today0.forEach(u=>{
        alertHtml+=`<div style="padding:10px 14px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center"><div><b>${u.asg.name}</b><div style="font-size:11.5px;color:var(--mu)">${u.sub.name}</div></div><span class="badge ba">วันนี้!</span></div>`;
      });
      alertHtml+=`</div></div>`;
    }
    if(soon.length){
      alertHtml+=`<div class="card" style="border:2px solid var(--tl);margin-bottom:14px"><div class="card-hd" style="background:var(--tll);border-bottom:1px solid var(--tl)"><div class="card-hd-title" style="color:var(--tl)"><i class="ti ti-calendar-clock"></i> งานที่ต้องส่งเร็วๆ นี้ (${soon.length} งาน)</div></div><div class="card-bd" style="padding:0">`;
      soon.forEach(u=>{
        const dt=u.days===1?'พรุ่งนี้':`อีก ${u.days} วัน`;
        alertHtml+=`<div style="padding:10px 14px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center"><div><b>${u.asg.name}</b><div style="font-size:11.5px;color:var(--mu)">${u.sub.name} • ${thDate(u.asg.dueDate)}</div></div><span class="badge bb">${dt}</span></div>`;
      });
      alertHtml+=`</div></div>`;
    }
    html+=alertHtml;
  }

  // Summary per subject
  if(subs.length){
    html+=`<div class="card"><div class="card-hd"><div class="card-hd-title">สรุปรายวิชา</div></div>`;
    subs.forEach(sub=>{
      // นับการส่งงาน (3 สถานะ)
      const asgs=(asgBlock(cid)[sub.id])||[];
      let sent=0,late=0;
      asgs.forEach(a=>{
        const v=((scBlock(cid)[sub.id]||{})[a.id]||{})[sid];
        if(a.type==='track'){
          if(v==='ตรงเวลา'){sent++;}else if(v==='ส่งช้า'){late++;sent++;}
        }else{
          if(v!==undefined&&v!==''&&!isNaN(parseFloat(v)))sent++;
        }
      });
      const asgPct=asgs.length?Math.round(sent/asgs.length*100):0;
      // มาเรียน
      const dates=Object.keys((attBlock(cid)[sub.id])||{});
      let ma=0,tot=0;dates.forEach(d=>{const st=((attBlock(cid)[sub.id]||{})[d]||{})[sid];if(st==='มา'||st==='สาย')ma++;if(st)tot++;});
      const attPct=tot?Math.round(ma/tot*100):0;
      const attCol=attPct>=80?'var(--gn)':attPct>=60?'var(--am)':'var(--rd)';
      html+=`<div class="card-bd" style="border-bottom:1px solid var(--bd)">
        <div class="f" style="justify-content:space-between;align-items:center;margin-bottom:6px">
          <div><b>${sub.name}</b>${sub.code?` <span style="font-size:11px;color:var(--mu)">${sub.code}</span>`:''}</div>
          <span class="badge ${asgPct>=80?'bg':asgPct>=50?'ba':'br'}">ส่งงาน ${sent}/${asgs.length}${late?' (ช้า '+late+')':''}</span>
        </div>
        <div class="f" style="gap:14px;font-size:12.5px;color:var(--mu)">
          <span>ส่งงาน <b style="color:var(--tx)">${asgPct}%</b></span>
          <span>มาเรียน <b style="color:${attCol}">${attPct}%</b></span>

      </div>`;
    });
    html+=`</div>`;
  } else {
    html+=`<div class="card"><div class="empty"><i class="ti ti-book-off"></i><div>ยังไม่มีวิชา</div><p>รอครูเพิ่มวิชาในระบบ</p></div></div>`;
  }
  document.getElementById('mainContent').innerHTML=html;
}

/* ── GRADES (ผลการเรียน) ── */
function renderGrades(){
  const stu=stuArr(me.classId).find(s=>s.id===me.studentId);
  const cls=db.classes.find(c=>c.id===me.classId);
  const subs=subArr(me.classId);
  const cid=me.classId,sid=me.studentId;

  // เช็คอีกรอบว่าครูเปิดจริงไหม (กัน state ค้าง)
  if(!cls.showGrades){
    document.getElementById('mainContent').innerHTML=`<div class="card"><div class="empty" style="padding:30px">
      <i class="ti ti-eye-off" style="font-size:36px;color:var(--mu)"></i>
      <div style="font-weight:700;margin-top:8px">ครูยังไม่เปิดให้ดูผลการเรียน</div>
      <p style="font-size:12.5px">รอครูเปิดให้ดูก่อนครับ</p>
    </div></div>`;
    return;
  }

  if(!subs.length){
    document.getElementById('mainContent').innerHTML=`<div class="card"><div class="empty" style="padding:30px"><i class="ti ti-book-off"></i><div>ยังไม่มีวิชา</div></div></div>`;
    return;
  }

  // คำนวณผลการเรียนแต่ละวิชา
  const rows=subs.map(sub=>{
    const t=calcTotal(cid,sub.id,sid);

/* ── พิมพ์รายงานผู้ปกครอง (นักเรียนพิมพ์เอง) ── */
function termCidKey(cid){
  const cls=db.classes.find(c=>c.id===cid);
  const tid=cls?.termId||(db.terms||[]).find(t=>t.isCurrent)?.id||'';
  return tid+'__'+cid;
}

function printParentReport(){
  const stu=stuArr(me.classId).find(s=>s.id===me.studentId);

  const sch=db.school||{};
  const cur=(db.terms||[]).find(t=>t.isCurrent)||(db.terms||[])[0];
  const cid=me.classId,sid=me.studentId;
  if(!stu||!cls)return;

  const rows=subs.map(sub=>{
    const attSub=((db.attendance[termCidKey(cid)]||{})[sub.id])||{};
    let ma=0,say=0,la=0,kh=0,tot=0;
    Object.keys(attSub).forEach(d=>{
      const st=attSub[d]?.[sid];
      if(st==='มา')ma++;else if(st==='สาย')say++;else if(st==='ลา')la++;else if(st==='ขาด')kh++;
      if(st)tot++;

/* ── ASSIGNMENTS ── */
function renderAssignments(){
  const cid=me.classId,sid=me.studentId;
  const subs=subArr(cid);
  if(!currentSubject||!subs.find(s=>s.id===currentSubject))currentSubject=subs[0]?.id||null;

  let html=``;
  if(subs.length>1){
    html+=`<div class="sub-tabs">`;
    subs.forEach(sub=>{html+=`<button class="sub-tab${sub.id===currentSubject?' active':''}" onclick="currentSubject='${sub.id}';renderAssignments()">${sub.name}</button>`;});
    html+=`</div>`;
  }
  if(!currentSubject){document.getElementById('mainContent').innerHTML=html+`<div class="card"><div class="empty"><i class="ti ti-book-off"></i><div>ยังไม่มีวิชา</div></div></div>`;return;}

  const sub=subs.find(s=>s.id===currentSubject);
  const asgs=(asgBlock(cid)[currentSubject])||[];

  // คำนวณสถานะแต่ละงาน
  function statusOf(a){
    const v=((scBlock(cid)[currentSubject]||{})[a.id]||{})[sid];
    if(a.type==='track'){
      if(v==='ตรงเวลา')return 'ontime';
      if(v==='ส่งช้า')return 'late';
      return 'none';
    } else {
      const has=(v!==undefined&&v!==''&&!isNaN(parseFloat(v)));
      return has?'ontime':'none';
    }
  }

  let cOntime=0,cLate=0,cNone=0;
  asgs.forEach(a=>{const st=statusOf(a);if(st==='ontime')cOntime++;else if(st==='late')cLate++;else cNone++;});

  html+=`<div class="sg">
    <div class="sc"><div class="sl">งานทั้งหมด</div><div class="sv" style="color:var(--tl)">${asgs.length}</div></div>
    <div class="sc"><div class="sl">ส่งตรงเวลา</div><div class="sv" style="color:var(--gn)">${cOntime}</div></div>
    <div class="sc"><div class="sl">ส่งช้า</div><div class="sv" style="color:var(--or)">${cLate}</div></div>
    <div class="sc"><div class="sl">ยังไม่ส่ง</div><div class="sv" style="color:var(--rd)">${cNone}</div></div>
  </div>`;

  if(!asgs.length){
    html+=`<div class="card"><div class="empty"><i class="ti ti-clipboard-list"></i><div>ยังไม่มีงาน</div><p>รอครูสั่งงาน</p></div></div>`;
    document.getElementById('mainContent').innerHTML=html;return;
  }

  const sorted=asgs.slice().sort((a,b)=>{
    if(a.dueDate&&b.dueDate)return a.dueDate.localeCompare(b.dueDate);
    if(a.dueDate)return -1;if(b.dueDate)return 1;return 0;
  });

  html+=`<div class="card"><div class="card-hd"><div class="card-hd-title">รายการงาน (${asgs.length} งาน)</div></div><div class="card-bd" style="padding:0">`;
  sorted.forEach(a=>{
    const st=statusOf(a);
    // ── สถานะไฟล์ที่ส่ง (ถ้ามี submission) ──
    const sub=stuSubs[a.id];
    let submitLine='';
    if(sub){
      const nFiles=(sub.files||[]).length;
      if(sub.status==='reviewed'){
        submitLine=`<div style="font-size:11.5px;color:var(--gn);margin-top:2px"><i class="ti ti-check-circle"></i> ครูตรวจแล้ว · ${nFiles} ไฟล์</div>`;
        if(sub.teacher_note){
          submitLine+=`<div style="margin-top:4px;background:#EFF6FF;border-left:3px solid var(--bl);padding:5px 8px;border-radius:4px;font-size:11.5px;color:#1E40AF"><b>โน้ตครู:</b> ${sub.teacher_note}</div>`;
        }
      } else {
        submitLine=`<div style="font-size:11.5px;color:var(--am);margin-top:2px"><i class="ti ti-clock"></i> รอครูตรวจ · ${nFiles} ไฟล์</div>`;
      }
    }
    let badge,bcol;
    if(st==='ontime'){badge='<span class="badge bg"><i class="ti ti-check"></i> ส่งแล้ว</span>';bcol='var(--gn)';}
    else if(st==='late'){badge='<span class="badge bo"><i class="ti ti-clock-exclamation"></i> ส่งช้า</span>';bcol='var(--or)';}
    else{badge='<span class="badge br"><i class="ti ti-x"></i> ยังไม่ส่ง</span>';bcol='var(--rd)';}
    const typeTag=(a.type==='track')?'<span style="font-size:10px;color:var(--or);background:var(--orl);padding:1px 6px;border-radius:8px;margin-left:6px">ติดตาม</span>':'';
    const fileTag=a.allowFileSubmit?'<span style="font-size:10px;color:#15803D;background:#DCFCE7;padding:1px 6px;border-radius:8px;margin-left:4px"><i class="ti ti-upload"></i> รับไฟล์</span>':'';
    const dueTag=a.dueDate?`<div style="font-size:11.5px;color:var(--mu);margin-top:2px"><i class="ti ti-calendar"></i> กำหนดส่ง: ${thDate(a.dueDate)}</div>`:'';
    // ── ปุ่มส่งไฟล์ ──
    let uploadBtn='';
    if(a.allowFileSubmit){
      if(sub&&sub.status==='reviewed'){
        uploadBtn=`<button class="btn btn-xs" onclick="viewMySubmission(${sub.id},'${a.name.replace(/'/g,'\\\'').replace(/"/g,'&quot;')}')"><i class="ti ti-eye"></i> ดูไฟล์</button>`;
      } else {
        uploadBtn=`<button class="btn btn-xs btn-p" onclick="openSubmitFile('${a.id}','${a.name.replace(/'/g,'\\\'').replace(/"/g,'&quot;')}')"><i class="ti ti-upload"></i> ${sub?'เพิ่ม/แก้ไข':'ส่งไฟล์'}</button>`;
      }
    }
    html+=`<div style="padding:12px 14px;border-bottom:1px solid var(--bd);border-left:4px solid ${bcol}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
        <div style="flex:1"><div style="font-weight:600">${a.name}${typeTag}${fileTag}</div>${dueTag}${submitLine}</div>
        <div style="flex-shrink:0;display:flex;flex-direction:column;gap:6px;align-items:flex-end">${badge}${uploadBtn}</div>
      </div>
    </div>`;
  });
  html+=`</div></div>`;

  document.getElementById('mainContent').innerHTML=html;
}

let stuSubs={}; // {asgId: {id, status, teacher_note, files:[]}}

async function loadMySubmissions(){
  if(!me)return;
  try{
    const {data:subs,error}=await sb.from('submissions').select('*').eq('student_id',me.studentId);
    if(error){console.error('load subs:',error);return;}
    const subIds=(subs||[]).map(s=>s.id);
    let files=[];
    if(subIds.length){
      const {data:f}=await sb.from('submission_files').select('*').in('submission_id',subIds);
      files=f||[];
    }
    stuSubs={};
    (subs||[]).forEach(s=>{
      stuSubs[s.assignment_id]={
        id:s.id, status:s.status||'pending',
        teacher_note:s.teacher_note||'',
        files:files.filter(f=>f.submission_id===s.id)
      };
    });
  }catch(e){console.error('loadMySubmissions:',e);}
}

  const files=sub?sub.files||[]:[];
  const rows=files.map(f=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--sf2);border-radius:6px;margin-bottom:4px">

async function uploadMyFiles(asgId,asgName){
  const inp=document.getElementById('mySubFile');
  if(!inp||!inp.files||!inp.files.length){showToast('เลือกไฟล์ก่อน');return;}
  const files=[...inp.files];
  const progress=document.getElementById('mySubProgress');
  // ตรวจไฟล์
  for(const f of files){
    if(f.size>MAX_FILE_SIZE){showToast(`ไฟล์ ${f.name} ใหญ่เกิน 5 MB`);return;}
  }
  // 1) หา / สร้าง submission
  let submissionId=stuSubs[asgId]?.id;
  if(!submissionId){
    const {data:inserted,error}=await sb.from('submissions').insert({
      assignment_id:asgId, student_id:me.studentId,
      status:'pending', submitted_at:new Date().toISOString()
    }).select().single();
    if(error){console.error(error);showToast('สร้าง submission ล้มเหลว');return;}
    submissionId=inserted.id;
  } else {
    // reset status เป็น pending อีกครั้ง (ครูอาจต้องดูใหม่)
    await sb.from('submissions').update({status:'pending',submitted_at:new Date().toISOString(),reviewed_at:null}).eq('id',submissionId);
  }
  // 2) upload ไฟล์
  let ok=0,fail=0;
  for(let i=0;i<files.length;i++){
    const f=files[i];
    if(progress)progress.textContent=`กำลังอัปโหลด ${i+1}/${files.length} : ${f.name}`;
    const ext=(f.name.split('.').pop()||'bin').toLowerCase();
    const timestamp=Date.now();
    const rand=Math.random().toString(36).slice(2,8);
    const path=`submissions/${submissionId}/${timestamp}_${rand}.${ext}`;
    const {error:upErr}=await sb.storage.from('submissions').upload(path,f,{cacheControl:'3600',upsert:false,contentType:f.type||'application/octet-stream'});
    if(upErr){console.error('upload err:',upErr);fail++;continue;}
    const {error:metaErr}=await sb.from('submission_files').insert({
      submission_id:submissionId,
      file_name:f.name, file_path:path,
      file_size:f.size, file_type:f.type||''
    });
    if(metaErr){console.error(metaErr);fail++;continue;}
    ok++;
  }
  _lastSaveTimeStu=Date.now();
  if(progress)progress.textContent=`เสร็จสิ้น: อัปโหลด ${ok} ไฟล์${fail?' · ล้มเหลว '+fail:''}`;
  showToast(`✓ อัปโหลด ${ok} ไฟล์${fail?' (ล้มเหลว '+fail+')':''}`);
  await loadMySubmissions();
  closeMD();
  renderAssignments();
}

async function delMyFile(fileId,asgId,asgName){
  if(!confirm('ลบไฟล์นี้?'))return;
  // หา path เพื่อลบใน storage
  const sub=stuSubs[asgId];
  const file=sub?.files?.find(f=>f.id===fileId);
  if(file){
    try{await sb.storage.from('submissions').remove([file.file_path]);}catch(e){console.error(e);}
  }
  await sb.from('submission_files').delete().eq('id',fileId);
  _lastSaveTimeStu=Date.now();
  await loadMySubmissions();
  openSubmitFile(asgId,asgName);
}

    <div style="max-height:280px;overflow:auto">${rows||'ไม่มีไฟล์'}</div>

/* ── PASSWORD UI HELPERS ── */
function updPwDots(inputId, dotsId){
  const inp=document.getElementById(inputId);const dots=document.getElementById(dotsId);
  if(!inp||!dots)return;
  const len=inp.value.length;const max=6;
  dots.innerHTML=Array.from({length:max},(_,i)=>`<div class="pw-dot${i<len?' filled':''}"></div>`).join('');
}
function togglePwEye(inputId, btn){
  const inp=document.getElementById(inputId);if(!inp)return;
  const show=inp.type==='password';inp.type=show?'text':'password';
  btn.innerHTML=show?'<i class="ti ti-eye-off"></i>':'<i class="ti ti-eye"></i>';
}
function updPwStrength(inputId){
  const pw=document.getElementById(inputId)?.value||'';
  const bar=document.getElementById('regPwBar');const hint=document.getElementById('regPwHint');
  if(!bar||!hint)return;
  let strength=0,msg='';
  if(pw.length>=4)strength++;if(pw.length>=8)strength++;
  if(/[A-Z]/.test(pw)||/[ก-ฮ]/.test(pw))strength++;
  if(/[0-9]/.test(pw))strength++;
  if(/[^a-zA-Z0-9ก-ฮ]/.test(pw))strength++;
  const colors=['#EF4444','#F97316','#EAB308','#22C55E','#16A34A'];
  const labels=['อ่อนมาก','อ่อน','พอใช้','แข็งแกร่ง','แข็งแกร่งมาก'];
  bar.style.width=(strength/5*100)+'%';bar.style.background=colors[strength-1]||'#E5E7EB';
  hint.textContent=pw.length?'ความแข็งแกร่ง: '+(labels[strength-1]||''):' ';
}
function checkPwMatch(){
  const pw=document.getElementById('regPw')?.value||'';
  const pw2=document.getElementById('regPw2')?.value||'';
  const msg=document.getElementById('pwMatchMsg');if(!msg)return;
  if(!pw2){msg.textContent='';return;}
  msg.innerHTML=pw===pw2?'<span style="color:var(--gn)"><i class="ti ti-check"></i> รหัสผ่านตรงกัน</span>':'<span style="color:var(--rd)"><i class="ti ti-x"></i> รหัสผ่านไม่ตรงกัน</span>';
}

let fsSelDate=null;
let fsView='check'; // 'check' หรือ 'summary'

function renderFiveSStu(){
  const cid=me.classId, sid=me.studentId;
  const g=fsMyGroup(cid,sid);
  const el=document.getElementById('mainContent');
  if(!g){
    el.innerHTML=`<div class="card"><div class="empty" style="padding:30px">
      <i class="ti ti-sparkles" style="font-size:36px;color:var(--mu)"></i>

    </div></div>`;
    return;
  }
  const items=fsGroupItemsStu(g);
  let html=`<div class="score-type-bar" style="margin-bottom:12px">
    <button class="score-type-btn${fsView==='check'?' active':''}" onclick="fsView='check';renderFiveSStu()"><i class="ti ti-checklist"></i> เช็คงาน</button>
    <button class="score-type-btn${fsView==='items'?' active':''}" onclick="fsView='items';renderFiveSStu()"><i class="ti ti-list-check"></i> หัวข้อ</button>
    <button class="score-type-btn${fsView==='members'?' active':''}" onclick="fsView='members';renderFiveSStu()"><i class="ti ti-users"></i> สมาชิก</button>
    <button class="score-type-btn${fsView==='summary'?' active':''}" onclick="fsView='summary';renderFiveSStu()"><i class="ti ti-chart-bar"></i> สรุปผล</button>
  </div>`;
  if(fsView==='check'){
    if(!items.length){
      html+=`<div class="card"><div class="empty" style="padding:30px">
        <i class="ti ti-list-check" style="font-size:36px;color:var(--mu)"></i>
        <div style="font-weight:700;margin-top:8px">ยังไม่มีหัวข้อกิจกรรม</div>
        <p style="font-size:12.5px">ไปที่แท็บ "หัวข้อ" เพื่อกำหนดหัวข้อของกลุ่ม</p>

    } else {

// items ของกลุ่ม (ถ้าไม่มี ใช้ default)
function fsGroupItemsStu(g){
  if(!g.items||!g.items.length)return ['สะสาง','สะดวก','สะอาด','สร้างมาตรฐาน','สร้างวินัย'];
  return g.items;
}

function fsRenderCheck(cid,sid,g,items){
  const today=new Date().toISOString().slice(0,10);
  if(!fsSelDate)fsSelDate=today;
  const date=fsSelDate;
  const stus=stuArr(cid);
  const members=[g.leaderId,...(g.memberIds||[])].map(id=>stus.find(s=>s.id===id)).filter(Boolean).sort((a,b)=>a.no-b.no);
  const dayChecks=fsChecksStu(cid,g.id,date);
  let html=`<div class="card">
    <div class="card-hd"><div class="card-hd-title"><i class="ti ti-sparkles"></i> ${g.name} · เช็คกิจกรรม 5 ส</div></div>
    <div class="card-bd">
      <div class="fg">
        <label class="fl"><i class="ti ti-calendar"></i> วันที่</label>
        <input type="date" value="${date}" onchange="if(fsHasPending()){if(!confirm('มีการเปลี่ยนแปลงที่ยังไม่บันทึก ต้องการทิ้ง?')){this.value=fsSelDate;return;}}fsClearPending();fsSelDate=this.value;renderFiveSStu()">
      </div>
      <div style="font-size:12px;color:var(--mu);padding:8px;background:var(--sf2);border-radius:6px;margin-bottom:10px">
        <i class="ti ti-info-circle"></i> ติ๊กในช่องเมื่อสมาชิก <b>ทำ</b> กิจกรรมนั้น · เว้นว่าง = <b>ไม่ทำ</b> · <b>กดปุ่มบันทึกด้านล่าง</b>เมื่อเช็คเสร็จ
      </div>
    </div>
  </div>`;
  // ตาราง: แถว=นักเรียน, คอลัมน์=หัวข้อ 5ส
  const n=items.length;
  const colW=n<=3?70:n<=5?50:40;
  html+=`<div class="card mt14" style="overflow:auto"><div style="padding:8px">
    <table id="fsTb" style="border-collapse:collapse;width:100%;font-size:12px;min-width:${180+n*colW}px" data-cid="${cid}" data-gid="${g.id}" data-date="${date}">
      <thead><tr style="background:var(--sf2)">
        <th style="border:1px solid var(--bd);padding:5px;width:32px">ที่</th>
        <th style="border:1px solid var(--bd);padding:5px 6px;text-align:left;min-width:100px">ชื่อ</th>`;
  items.forEach((it,i)=>{
    html+=`<th style="border:1px solid var(--bd);padding:3px 2px;background:#EEF2FF;text-align:center;width:${colW}px;vertical-align:middle;height:90px">
      <div style="writing-mode:vertical-rl;transform:rotate(180deg);font-size:11px;font-weight:600;margin:0 auto">${it}</div>
    </th>`;
  });
  html+=`</tr></thead><tbody>`;
  members.forEach(m=>{
    const isLeader=m.id===g.leaderId;
    html+=`<tr>
      <td style="border:1px solid var(--bd);padding:3px;text-align:center;color:var(--mu);font-size:11px">${m.no}</td>
      <td style="border:1px solid var(--bd);padding:3px 6px;font-size:12px">${m.firstName} ${m.lastName}${isLeader?' <i class="ti ti-crown" style="color:#B45309;font-size:12px"></i>':''}</td>`;
    items.forEach((it,i)=>{
      const done=((dayChecks[m.id]||{}).items||{})[i]===true;
      html+=`<td style="border:1px solid var(--bd);padding:0;text-align:center;background:${done?'#DCFCE7':''}" class="fs-cell">
        <input type="checkbox" ${done?'checked':''} data-stu="${m.id}" data-item="${i}" onchange="fsMark(this)" style="width:20px;height:20px;cursor:pointer;margin:4px">
      </td>`;
    });
    html+=`</tr>`;
  });
  html+=`</tbody></table></div>
  <div class="cp" style="border-top:1px solid var(--bd);background:var(--sf2)">
    <div class="f g8" style="justify-content:space-between;align-items:center">
      <div id="fsPendingLbl" style="font-size:12px;color:var(--mu)"><i class="ti ti-info-circle"></i> ยังไม่มีการเปลี่ยนแปลง</div>
      <button class="btn btn-p" id="fsSaveBtn" onclick="fsSaveAll()"><i class="ti ti-device-floppy"></i> บันทึก</button>
    </div>
  </div>
  </div>`;
  return html;
}

// ── รวมการเปลี่ยนแปลงที่รอบันทึก ──
window._fsPending={}; // {stuId: {itemIdx: bool}}

function fsHasPending(){
  return Object.keys(window._fsPending||{}).length>0;
}
function fsClearPending(){
  window._fsPending={};
}
function fsMark(cb){
  const stu=cb.dataset.stu;
  const idx=parseInt(cb.dataset.item);
  if(!window._fsPending)window._fsPending={};
  if(!window._fsPending[stu])window._fsPending[stu]={};
  window._fsPending[stu][idx]=cb.checked;
  // เปลี่ยนสีพื้น
  const td=cb.closest('td');
  if(td)td.style.background=cb.checked?'#FEF3C7':'#FEF3C7';  // เหลือง = รอบันทึก
  const lbl=document.getElementById('fsPendingLbl');
  const total=Object.values(window._fsPending).reduce((s,o)=>s+Object.keys(o).length,0);
  if(lbl)lbl.innerHTML=`<i class="ti ti-alert-triangle" style="color:var(--am)"></i> มีการเปลี่ยนแปลง ${total} รายการ (ยังไม่บันทึก)`;
}

function fsSaveAll(){
  const tb=document.getElementById('fsTb');
  if(!tb)return;
  const cid=tb.dataset.cid;
  const gid=tb.dataset.gid;
  const date=tb.dataset.date;
  const pending=window._fsPending||{};
  const cnt=Object.values(pending).reduce((s,o)=>s+Object.keys(o).length,0);
  if(!cnt){showToast('ไม่มีการเปลี่ยนแปลง');return;}
  // บันทึกทุกช่องลง db
  if(!db.fiveS.checks)db.fiveS.checks={};
  const key=fsGroupKeyStu(cid)+'__'+gid;
  if(!db.fiveS.checks[key])db.fiveS.checks[key]={};
  if(!db.fiveS.checks[key][date])db.fiveS.checks[key][date]={};
  Object.keys(pending).forEach(stuId=>{
    if(!db.fiveS.checks[key][date][stuId])db.fiveS.checks[key][date][stuId]={items:{}};
    if(!db.fiveS.checks[key][date][stuId].items)db.fiveS.checks[key][date][stuId].items={};
    Object.keys(pending[stuId]).forEach(idx=>{
      db.fiveS.checks[key][date][stuId].items[idx]=pending[stuId][idx];
    });
  });
  // sync ขึ้น cloud
  saveDbNow();
  fsClearPending();
  showToast(`✓ บันทึกแล้ว ${cnt} รายการ`);
  // เปลี่ยนสีพื้นกลับเป็นเขียว (ตรงตามที่ติ๊ก)
  document.querySelectorAll('.fs-cell').forEach(td=>{
    const cb=td.querySelector('input[type="checkbox"]');
    if(cb)td.style.background=cb.checked?'#DCFCE7':'';
  });
  const lbl=document.getElementById('fsPendingLbl');
  if(lbl)lbl.innerHTML='<i class="ti ti-circle-check" style="color:var(--gn)"></i> บันทึกสำเร็จ';
}

// บันทึกเฉพาะข้อมูล 5ส (groups + members + checks) — ประหยัดเวลา
async function _save5sTables(){
  const groupRows=[], memberRows=[], checkRows=[];
  Object.keys((db.fiveS||{}).groups||{}).forEach(tkey=>{
    const cid=tkey.split('__')[1]||tkey;
    (db.fiveS.groups[tkey]||[]).forEach(g=>{
      groupRows.push({
        id:g.id, class_id:cid, name:g.name,
        leader_id:g.leaderId||null, items:g.items||null
      });
      (g.memberIds||[]).forEach(sid=>{
        memberRows.push({group_id:g.id,student_id:sid});
      });
    });
  });
  Object.keys((db.fiveS||{}).checks||{}).forEach(ckey=>{
    const parts=ckey.split('__');
    const gid=parts[parts.length-1];
    Object.keys(db.fiveS.checks[ckey]||{}).forEach(date=>{
      Object.keys(db.fiveS.checks[ckey][date]||{}).forEach(stuId=>{
        const rec=db.fiveS.checks[ckey][date][stuId]||{};
        checkRows.push({
          group_id:gid, student_id:stuId, date,
          items:rec.items||{}, note:rec.note||''
        });
      });
    });
  });
  try{
    if(groupRows.length) await sb.from('five_s_groups').upsert(groupRows,{onConflict:'id'});
    // Clear old members ของแต่ละกลุ่มก่อน insert (กันซ้อน)
    if(memberRows.length){
      const gids=[...new Set(memberRows.map(r=>r.group_id))];
      for(const gid of gids){
        await sb.from('five_s_members').delete().eq('group_id',gid);
      }
      await sb.from('five_s_members').insert(memberRows);
    }
    if(checkRows.length) await sb.from('five_s_checks').upsert(checkRows,{onConflict:'group_id,student_id,date'});
    return true;
  }catch(e){console.error('5s save error:',e);return false;}
}

function saveDbNow(){
  try{localStorage.setItem('crDB4',JSON.stringify(db));}catch(e){}
  _lastSaveTimeStu=Date.now();
  _save5sTables();
}
function saveDbSilent(){
  try{localStorage.setItem('crDB4',JSON.stringify(db));}catch(e){}
  clearTimeout(window._fsSave);
  window._fsSave=setTimeout(async()=>{
    _lastSaveTimeStu=Date.now();
    await _save5sTables();
  },1500);
}

// ── จัดการสมาชิก ──
// ── หน้าจัดการหัวข้อ 5 ส (หัวหน้ากลุ่ม) ──
function fsRenderItems(cid,sid,g,items){
  const rows=items.map((it,i)=>`
    <div style="display:flex;gap:6px;align-items:center;margin-bottom:6px">
      <span style="font-size:11px;color:var(--mu);width:24px;text-align:center">${i+1}.</span>
      <input type="text" class="fsItInp" value="${it.replace(/"/g,'&quot;')}" style="flex:1">
      <button class="btn btn-xs" style="color:var(--rd);border-color:var(--rd)" onclick="fsItRemoveRow(this)"><i class="ti ti-x"></i></button>
    </div>`).join('');
  let html=`<div class="card">
    <div class="card-hd"><div class="card-hd-title"><i class="ti ti-list-check"></i> หัวข้อกิจกรรม — ${g.name}</div></div>
    <div class="card-bd">
      <div style="font-size:12px;color:var(--mu);padding:8px;background:var(--sf2);border-radius:6px;margin-bottom:12px">
        <i class="ti ti-info-circle"></i> กำหนดหัวข้อเฉพาะกลุ่มของคุณ — ตามพื้นที่รับผิดชอบ
      </div>
      <div id="fsItRows">${rows}</div>
      <button class="btn btn-sm btn-full" style="margin-top:8px" onclick="fsItAddRow()"><i class="ti ti-plus"></i> เพิ่มหัวข้อใหม่</button>
    </div>
  </div>
  <div style="margin-top:14px">
    <button class="btn btn-p btn-full" onclick="fsSaveItems('${cid}','${g.id}')"><i class="ti ti-device-floppy"></i> บันทึกหัวข้อ</button>
  </div>`;
  return html;
}

function fsItAddRow(){
  const wrap=document.getElementById('fsItRows');
  if(!wrap)return;
  const idx=wrap.querySelectorAll('.fsItInp').length;
  const div=document.createElement('div');
  div.style.cssText='display:flex;gap:6px;align-items:center;margin-bottom:6px';
  div.innerHTML=`<span style="font-size:11px;color:var(--mu);width:24px;text-align:center">${idx+1}.</span>
    <input type="text" class="fsItInp" placeholder="ชื่อหัวข้อใหม่" style="flex:1">
    <button class="btn btn-xs" style="color:var(--rd);border-color:var(--rd)" onclick="fsItRemoveRow(this)"><i class="ti ti-x"></i></button>`;
  wrap.appendChild(div);
  div.querySelector('input').focus();
}
function fsItRemoveRow(btn){
  btn.parentElement.remove();
  // Renumber
  document.querySelectorAll('#fsItRows > div').forEach((div,i)=>{
    const span=div.querySelector('span');
    if(span)span.textContent=(i+1)+'.';
  });
}
function fsSaveItems(cid,gid){
  const items=[...document.querySelectorAll('.fsItInp')].map(inp=>inp.value.trim()).filter(v=>v);
  if(!items.length){showToast('กรุณากรอกหัวข้ออย่างน้อย 1 หัวข้อ');return;}
  const groups=fsGroupsStu(cid);
  const g=groups.find(x=>x.id===gid);
  if(!g)return;
  g.items=items;
  saveDbNow();
  showToast('บันทึกหัวข้อแล้ว ✓');
}

function fsRenderMembers(cid,sid,g){
  const stus=stuArr(cid);
  const groups=fsGroupsStu(cid);
  // คนที่อยู่ในกลุ่มอื่นแล้ว (ไม่รวมกลุ่มเรา)
  const assignedElsewhere=new Set();
  groups.forEach(g2=>{
    if(g2.id===g.id)return;
    if(g2.leaderId)assignedElsewhere.add(g2.leaderId);
    (g2.memberIds||[]).forEach(id=>assignedElsewhere.add(id));
  });
  const myMembers=(g.memberIds||[]).map(id=>stus.find(s=>s.id===id)).filter(Boolean).sort((a,b)=>a.no-b.no);
  const available=stus.filter(s=>s.id!==g.leaderId && !g.memberIds.includes(s.id) && !assignedElsewhere.has(s.id));
  const leader=stus.find(s=>s.id===g.leaderId);
  let html=`<div class="card">
    <div class="card-hd"><div class="card-hd-title"><i class="ti ti-users"></i> สมาชิก ${g.name}</div></div>
    <div class="card-bd">
      <div style="padding:10px;background:#FEF3C7;border-radius:6px;margin-bottom:12px">
        <span style="font-size:12px;color:#92400E"><i class="ti ti-crown"></i> <b>หัวหน้ากลุ่ม:</b> ${leader?.firstName||''} ${leader?.lastName||''} (คุณ)</span>
      </div>
      <div style="font-weight:700;margin-bottom:6px;font-size:13px">สมาชิกปัจจุบัน (${myMembers.length} คน)</div>`;
  if(!myMembers.length){
    html+=`<div style="padding:14px;background:var(--sf2);border-radius:6px;text-align:center;font-size:12px;color:var(--mu)">ยังไม่มีสมาชิก · กดปุ่มด้านล่างเพื่อเพิ่ม</div>`;
  } else {
    myMembers.forEach(m=>{
      html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--sf2);border-radius:6px;margin-bottom:5px">
        <span style="font-size:13px">${m.no}. ${m.firstName} ${m.lastName}</span>
        <button class="btn btn-xs" style="color:var(--rd);border-color:var(--rd)" onclick="fsRemoveMember('${cid}','${g.id}','${m.id}')"><i class="ti ti-x"></i></button>
      </div>`;
    });
  }
  html+=`<div style="margin-top:14px">
    <button class="btn btn-tl btn-full" onclick="fsOpenAddMember('${cid}','${g.id}')"${!available.length?' disabled':''}><i class="ti ti-user-plus"></i> เพิ่มสมาชิก ${available.length?`(มี ${available.length} คนว่าง)`:'(ไม่มีคนว่าง)'}</button>
  </div>
  </div></div>`;
  return html;
}

function fsOpenAddMember(cid,gid){
  const stus=stuArr(cid);
  const groups=fsGroupsStu(cid);
  const g=groups.find(x=>x.id===gid);
  const assignedElsewhere=new Set();
  groups.forEach(g2=>{
    if(g2.leaderId)assignedElsewhere.add(g2.leaderId);
    (g2.memberIds||[]).forEach(id=>assignedElsewhere.add(id));
  });
  const available=stus.filter(s=>s.id!==g.leaderId && !g.memberIds.includes(s.id) && !assignedElsewhere.has(s.id)).sort((a,b)=>a.no-b.no);
  const opts=available.map(s=>`<label style="display:flex;align-items:center;gap:8px;padding:8px;background:var(--sf2);border-radius:6px;margin-bottom:4px;cursor:pointer">
    <input type="checkbox" class="fsAddMem" value="${s.id}" style="width:18px;height:18px">
    <span style="font-size:13px">${s.no}. ${s.firstName} ${s.lastName}</span>
  </label>`).join('');
  showMD(`<div class="mt">เพิ่มสมาชิกเข้ากลุ่ม</div>
    <div style="max-height:340px;overflow:auto;padding:4px">${opts||'<div style="text-align:center;padding:20px;color:var(--mu);font-size:12px">ไม่มีนักเรียนว่าง</div>'}</div>
    <div class="f g8" style="justify-content:flex-end;margin-top:10px">
      <button class="btn" onclick="closeMD()">ยกเลิก</button>
      <button class="btn btn-p" onclick="fsSubmitAddMembers('${cid}','${gid}')"><i class="ti ti-check"></i>เพิ่ม</button>
    </div>
  `);
}
function fsSubmitAddMembers(cid,gid){
  const ids=[...document.querySelectorAll('.fsAddMem:checked')].map(cb=>cb.value);
  if(!ids.length){showToast('กรุณาเลือกอย่างน้อย 1 คน');return;}
  const groups=fsGroupsStu(cid);
  const g=groups.find(x=>x.id===gid);
  if(!g)return;
  g.memberIds=[...new Set([...(g.memberIds||[]),...ids])];
  saveDbSilent();
  closeMD();renderFiveSStu();
  showToast(`เพิ่ม ${ids.length} คนเข้ากลุ่มแล้ว ✓`);
}
function fsRemoveMember(cid,gid,stuId){
  if(!confirm('เอาสมาชิกคนนี้ออก?'))return;
  const groups=fsGroupsStu(cid);
  const g=groups.find(x=>x.id===gid);
  if(!g)return;
  g.memberIds=(g.memberIds||[]).filter(id=>id!==stuId);
  saveDbSilent();renderFiveSStu();
  showToast('เอาออกแล้ว');
}

// ── สรุปผล ──
function fsRenderSummary(cid,sid,g,items){
  const stus=stuArr(cid);
  const members=[g.leaderId,...(g.memberIds||[])].map(id=>stus.find(s=>s.id===id)).filter(Boolean).sort((a,b)=>a.no-b.no);
  const today=new Date();
  const dates=[];
  for(let i=13;i>=0;i--){
    const d=new Date(today);d.setDate(d.getDate()-i);
    dates.push(d.toISOString().slice(0,10));
  }
  // นับ per stu
  const perStu={};
  let totalP=0,totalD=0,daysWith=0;
  members.forEach(m=>{perStu[m.id]={name:m.firstName+' '+m.lastName,no:m.no,done:0,total:0};});
  dates.forEach(d=>{
    const c=fsChecksStu(cid,g.id,d);
    if(!Object.keys(c).length)return;
    daysWith++;
    members.forEach(m=>{
      items.forEach((it,i)=>{
        const done=((c[m.id]||{}).items||{})[i]===true;
        totalP++;perStu[m.id].total++;
        if(done){totalD++;perStu[m.id].done++;}
      });
    });
  });
  const pct=totalP?Math.round(totalD/totalP*100):0;
  const pctCol=pct>=80?'var(--gn)':pct>=60?'var(--am)':'var(--rd)';
  let html=`<div class="profile-card" style="text-align:center">
    <div style="font-size:12px;opacity:.85"><i class="ti ti-chart-bar"></i> สรุป 14 วันล่าสุด</div>
    <div style="font-weight:700;font-size:15px;margin-top:2px">${g.name}</div>
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.2)">
      <div style="font-size:12px;opacity:.85">คะแนนกลุ่ม</div>
      <div style="font-size:32px;font-weight:800">${pct}%</div>
      <div style="font-size:11px;opacity:.85">${daysWith} วันที่เช็ค</div>
    </div>
  </div>
  <div class="card mt14">
    <div class="card-hd"><div class="card-hd-title"><i class="ti ti-users"></i> คะแนนรายบุคคล</div></div>
    <div class="card-bd" style="padding:0">`;
  if(!daysWith){
    html+=`<div style="padding:20px;text-align:center;color:var(--mu);font-size:12.5px">ยังไม่มีข้อมูลใน 14 วันที่ผ่านมา</div>`;
  } else {
    Object.values(perStu).sort((a,b)=>a.no-b.no).forEach(s=>{
      const p=s.total?Math.round(s.done/s.total*100):0;
      const col=p>=80?'var(--gn)':p>=60?'var(--am)':'var(--rd)';
      html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--bd)">
        <div>
          <div style="font-size:13px;font-weight:600">${s.no}. ${s.name}</div>
          <div style="font-size:11px;color:var(--mu)">${s.done}/${s.total} ครั้ง</div>
        </div>
        <div style="font-size:18px;font-weight:800;color:${col}">${p}%</div>
      </div>`;
    });
  }
  html+=`</div></div>`;
  return html;
}

init();
